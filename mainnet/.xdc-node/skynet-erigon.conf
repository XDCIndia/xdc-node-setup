#==============================================================================
# XDC SkyNet Agent Configuration
#
# Copy this file to skynet.conf and fill in your values:
#   cp skynet.conf.template skynet.conf
#   chmod 600 skynet.conf   # Restrict permissions — contains API keys!
#
# This file is sourced as a shell script. Use KEY=value format (no spaces
# around '='). Quote values containing spaces.
#==============================================================================

#------------------------------------------------------------------------------
# API Connection (REQUIRED)
#------------------------------------------------------------------------------

# XDC SkyNet platform API endpoint
SKYNET_API_URL=https://net.xdc.network/api/v1

# Your node's API key for authentication (auto-populated during registration)
# ⚠️  SECURITY: Keep this secret! Never commit to git or share publicly.
#     Set file permissions: chmod 600 skynet.conf
SKYNET_API_KEY=

# Node ID (auto-populated on first boot if empty — do not edit manually)
SKYNET_NODE_ID=

#------------------------------------------------------------------------------
# Node Identity
#------------------------------------------------------------------------------

# Display name for your node on the SkyNet dashboard
SKYNET_NODE_NAME=erigon-

# Node role — determines dashboard categorization and alerting rules
# Options: fullnode, masternode, archive
SKYNET_ROLE=fullnode

#------------------------------------------------------------------------------
# Notifications (Optional - fill in to receive alerts)
#------------------------------------------------------------------------------

# Email address for alert notifications
SKYNET_EMAIL=

# Telegram handle for alert notifications (e.g., @username or chat ID)
SKYNET_TELEGRAM=
