# XDC Node Configuration File (TOML format)
# Place this file at /opt/xdc-node/config.toml

#==============================================================================
# Network Configuration
#==============================================================================
[network]
name = "mainnet"          # mainnet, testnet, devnet, or apothem
instance_name = "xdc-node"

#==============================================================================
# Node Type
#==============================================================================
[node]
type = "full"             # full, archive, masternode
sync_mode = "full"        # full or fast
gc_mode = "full"          # full or archive

#==============================================================================
# P2P Network
#==============================================================================
[p2p]
port = 30303
nat = "any"

#==============================================================================
# RPC Configuration
#==============================================================================
[rpc]
enabled = true
addr = "0.0.0.0"
port = 8545
api = ["admin", "eth", "net", "web3", "XDPoS"]
cors_domain = "*"
vhosts = "*"

#==============================================================================
# WebSocket Configuration
#==============================================================================
[websocket]
enabled = true
addr = "0.0.0.0"
port = 8546
api = ["eth", "net", "web3", "XDPoS"]
origins = "*"

#==============================================================================
# Metrics
#==============================================================================
[metrics]
enabled = true
addr = "0.0.0.0"
port = 6060

#==============================================================================
# Logging
#==============================================================================
[log]
level = 2                 # 0=silent, 1=error, 2=warn, 3=info, 4=debug

#==============================================================================
# Data Directories
#==============================================================================
[paths]
data_dir = "/opt/xdc-node/mainnet/xdcchain"
config_dir = "/opt/xdc-node/mainnet/.xdc-node"

#==============================================================================
# SkyNet Registration (optional)
#==============================================================================
[skynet]
enabled = true
api_url = "https://net.xdc.network/api/v1"
# email = "your@email.com"
# telegram = "@username"

#==============================================================================
# Monitoring (optional - requires --profile monitoring)
#==============================================================================
[monitoring]
prometheus_enabled = false
grafana_enabled = false
