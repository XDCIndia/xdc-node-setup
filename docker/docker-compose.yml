#==============================================================================
# XDC Node Docker Compose — Core Services
# For monitoring stack: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# Or simply: xdc start --monitoring
#==============================================================================

services:
  #--------------------------------------------------------------------------
  # XDC Node - Main blockchain client
  #--------------------------------------------------------------------------
  xdc-node:
    image: xinfinorg/xdposchain:v2.6.8
    container_name: xdc-node
    restart: always
    ports:
      - "${PORT:-30303}:30303"
      - "${PORT:-30303}:30303/udp"
      - "127.0.0.1:${RPC_PORT:-8545}:8545"
      - "127.0.0.1:${WS_PORT:-8546}:8546"
    volumes:
      - ../${NETWORK:-mainnet}/xdcchain:/work/xdcchain
      - ./${NETWORK:-mainnet}/genesis.json:/work/genesis.json:ro
      - ./${NETWORK:-mainnet}/start-node.sh:/work/start.sh:ro
      - ./${NETWORK:-mainnet}/bootnodes.list:/work/bootnodes.list:ro
      - ./${NETWORK:-mainnet}/.pwd:/work/.pwd:ro
      - ./entrypoint.sh:/work/entrypoint.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/config.toml:/etc/xdc-node/config.toml:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ../${NETWORK:-mainnet}/.xdc-node/.env
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - SYNC_MODE=${SYNC_MODE:-full}
      - GC_MODE=${GC_MODE:-full}
      - RPC_PORT=${RPC_PORT:-8545}
      - WS_PORT=${WS_PORT:-8546}
      - INSTANCE_NAME=${INSTANCE_NAME:-xdc-node}
    entrypoint: ["/bin/bash", "/work/entrypoint.sh"]
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  #--------------------------------------------------------------------------
  # Dashboard - Web UI (nginx)
  #--------------------------------------------------------------------------
  dashboard:
    image: nginx:alpine
    container_name: xdc-dashboard
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:3000"
    volumes:
      - ../dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../dashboard/html:/usr/share/nginx/html:ro
    environment:
      - RPC_URL=http://xdc-node:8545
    networks:
      - xdc-network
    depends_on:
      xdc-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  #--------------------------------------------------------------------------
  # SkyNet Agent - Fleet monitoring heartbeats (runs on host network)
  #--------------------------------------------------------------------------
  xdc-monitoring:
    image: alpine:3.19
    container_name: xdc-monitoring
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./skynet-agent.sh:/opt/skynet/agent.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/skynet.conf:/etc/xdc-node/skynet.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
    environment:
      - SKYNET_CONF=/etc/xdc-node/skynet.conf
      - XDC_RPC_URL=http://127.0.0.1:${RPC_PORT:-8545}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash curl jq bc procps >/dev/null 2>&1
        chmod +x /opt/skynet/agent.sh
        echo "SkyNet Agent: heartbeat every 60s"
        while true; do
          /opt/skynet/agent.sh 2>/dev/null
          sleep 60
        done
    profiles:
      - skynet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

#==============================================================================
# Networks
#==============================================================================
networks:
  xdc-network:
    driver: bridge
