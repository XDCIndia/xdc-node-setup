#==============================================================================
# XDC Node Docker Compose — GP5 Client on Apothem (Testnet)
# Uses GP5 v34 image with XNS standard ports
#==============================================================================

services:
  xdc-node-gp5-apothem:
    image: anilchinchawale/gp5-xdc:v35
    platform: linux/amd64
    container_name: xdc-node-gp5-apothem
    restart: always
    ports:
      - "${P2P_PORT:-30322}:30303"
      - "${P2P_PORT:-30322}:30303/udp"
      - "${RPC_BIND:-127.0.0.1}:${RPC_PORT:-9545}:9545"
      - "${WS_BIND:-127.0.0.1}:${WS_PORT:-9546}:9546"
    volumes:
      - ${DATA_DIR:-../apothem}/xdcchain-gp5:/work/xdcchain
      - ./apothem/genesis.json:/work/genesis.json:ro
      - ./geth-pr5/start-gp5.sh:/work/start.sh:ro
      - ./apothem/bootnodes.list:/work/bootnodes.list:ro
      - ${DATA_DIR:-../apothem}/.xdc-node/.pwd:/work/.pwd:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=apothem
      - NETWORK_ID=51
      - SYNC_MODE=${SYNC_MODE:-full}
      - GC_MODE=${GC_MODE:-full}
      - EXTERNAL_IP=${EXTERNAL_IP:-}
      - INSTANCE_NAME=${INSTANCE_NAME:-XDC_GP5_Apothem}
      - HTTP_API=${HTTP_API:-admin,eth,net,web3,XDPoS}
      - ETHSTATS_ENABLED=${ETHSTATS_ENABLED:-true}
      - STATS_SECRET=${STATS_SECRET:-xdc_openscan_stats_2026}
      - STATS_SERVER=${STATS_SERVER:-stats.xdcindia.com:443}
    entrypoint: ["/bin/sh", "/work/start.sh"]
    networks:
      - docker_xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  xdc-agent-gp5-apothem:
    image: anilchinchawale/xdc-agent:v2.6
    container_name: xdc-agent-gp5-apothem
    restart: always
    network_mode: host
    depends_on:
      xdc-node-gp5-apothem:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-../apothem}/.xdc-node/skynet.conf:/etc/xdc-node/skynet.conf:ro
    environment:
      - RPC_URL=http://localhost:${RPC_PORT:-9545}
      - NETWORK=apothem
      - NODE_NAME=${NODE_NAME:-xdc-gp5-apothem}
      - SKYNET_URL=${SKYNET_URL:-https://net.xdc.network}

networks:
  docker_xdc-network:
    external: true
