# XDC Node Health Check Service
# Provides Kubernetes-compatible health check endpoints
#
# Endpoints:
#   GET /health/live   - Liveness probe (200 if node process is running)
#   GET /health/ready  - Readiness probe (200 if node is synced and ready)
#   GET /health/sync   - Sync status details
#
# Usage:
#   docker compose -f docker-compose.health.yml up -d

services:
  health-check:
    image: alpine:latest
    container_name: xdc-health-check
    restart: unless-stopped
    ports:
      - "${HEALTH_PORT:-8080}:8080"
    environment:
      - XDC_RPC_URL=${XDC_RPC_URL:-http://xdc-node:8545}
      - HEALTH_PORT=8080
    volumes:
      - ./scripts/health-check-server.sh:/usr/local/bin/health-check-server.sh:ro
      - /var/log:/var/log
    command: >
      sh -c "
        apk add --no-cache curl netcat-openbsd python3 bash 2>/dev/null
        chmod +x /usr/local/bin/health-check-server.sh
        exec /usr/local/bin/health-check-server.sh 8080
      "
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  xdc-network:
    external: true
    name: xdc-node-setup_xdc-network
