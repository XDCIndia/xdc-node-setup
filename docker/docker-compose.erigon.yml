services:
  xdc-erigon:
    image: docker-xdc-erigon:latest
    container_name: xdc-erigon
    restart: always
    ports:
      - "0.0.0.0:30304:30304"
      - "0.0.0.0:30304:30304/udp"
      - "127.0.0.1:8555:8555"
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:6060:6060"
    volumes:
      - ../${NETWORK:-mainnet}/erigon:/home/erigon/.local/share/erigon
      - ../${NETWORK:-mainnet}/erigon/static-nodes.json:/home/erigon/.local/share/erigon/static-nodes.json:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
    entrypoint: ["/usr/local/bin/erigon"]
    command:
      - --datadir=/home/erigon/.local/share/erigon
      - --chain=xdc-apothem
      - --networkid=51
      - --port=30304
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8555
      - --http.vhosts=*
      - --http.corsdomain=*
      - --http.api=eth,net,web3,txpool,debug,erigon
      - --metrics
      - --metrics.addr=0.0.0.0
      - --metrics.port=6060
      - --staticpeers=/home/erigon/.local/share/erigon/static-nodes.json
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8555 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 10

networks:
  xdc-network:
    external: true
    name: docker_xdc-network
