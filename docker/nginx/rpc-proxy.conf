# Rate limit zone: 10MB shared memory, 100 requests per minute per IP
limit_req_zone $binary_remote_addr zone=rpc:10m rate=100r/m;

# HTTP to HTTPS redirect (when TLS is enabled)
server {
    listen 80;
    server_name _;
    
    # Allow ACME challenges for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect HTTP to HTTPS when TLS is enabled
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server with TLS termination
server {
    listen 443 ssl;
    server_name _;
    
    # TLS certificates (mounted from host or generated)
    ssl_certificate /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    
    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Rate limiting for RPC endpoints
    location / {
        limit_req zone=rpc burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://localhost:8545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint (no rate limit)
    location /health {
        proxy_pass http://localhost:8545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

# JSON-RPC proxy (HTTP only, for internal use)
server {
    listen 8545;
    server_name _;
    
    # Apply rate limiting
    location / {
        limit_req zone=rpc burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://localhost:8545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
