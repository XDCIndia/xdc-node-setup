#==============================================================================
# XDC Node Docker Compose — GP5 Client (PBSS) on Mainnet
# Path-based state scheme, no-discover, static peer to local v268
# XNS naming: 168-gp5-full-pbss-mainnet-168
#==============================================================================

services:
  168-gp5-full-pbss-mainnet-168:
    image: anilchinchawale/gp5-xdc:v35
    platform: linux/amd64
    container_name: 168-gp5-full-pbss-mainnet-168
    restart: always
    network_mode: host
    volumes:
      - ${DATA_DIR:-./data/mainnet/gp5-pbss}/xdcchain:/work/xdcchain
      - ./genesis.json:/work/genesis.json:ro
      - ../geth-pr5/start-gp5.sh:/work/start.sh:ro
      - ./bootnodes.list:/work/bootnodes.list:ro
      - ${DATA_DIR:-./data/mainnet/gp5-pbss}/.pwd:/work/.pwd:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=mainnet
      - NETWORK_ID=50
      - SYNC_MODE=full
      - GC_MODE=full
      - STATE_SCHEME=path
      - CACHE=4096
      - MAXPEERS=50
      - HTTP_PORT=9845
      - WS_PORT=9846
      - AUTHRPC_PORT=8556
      - P2P_PORT=30326
      - EXTERNAL_IP=${EXTERNAL_IP:-}
      - INSTANCE_NAME=${INSTANCE_NAME:-168-gp5-full-pbss-mainnet-168}
      - HTTP_API=admin,eth,net,web3,XDPoS
      - ETHSTATS_ENABLED=${ETHSTATS_ENABLED:-true}
      - STATS_SECRET=${STATS_SECRET:-xdc_openscan_stats_2026}
      - STATS_SERVER=${STATS_SERVER:-stats.xdcindia.com:443}
      - NO_DISCOVER=true
      - STATIC_NODES=${STATIC_NODES:-}
      - TRUSTED_NODES=${TRUSTED_NODES:-}
    entrypoint: ["/bin/sh", "/work/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9845 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  skyone-168-gp5-full-pbss-mainnet-168:
    image: anilchinchawale/xdc-agent:v2.6
    container_name: skyone-168-gp5-full-pbss-mainnet-168
    restart: always
    network_mode: host
    depends_on:
      168-gp5-full-pbss-mainnet-168:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data/mainnet/gp5-pbss}/skynet.conf:/etc/xdc-node/skynet.conf:ro
    environment:
      - RPC_URL=http://localhost:9845
      - NETWORK=mainnet
      - NODE_NAME=${NODE_NAME:-168-gp5-full-pbss-mainnet-168}
      - SKYNET_URL=${SKYNET_URL:-https://net.xdc.network}
