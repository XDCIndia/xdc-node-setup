version: '3.8'
services:
  168-gp5-full-hbss-mainnet-168:
    image: anilchinchawale/gp5-xdc:v94-amd64
    platform: linux/amd64
    container_name: 168-gp5-full-hbss-mainnet-168
    restart: unless-stopped
    stop_grace_period: 3m
    network_mode: host
    volumes:
    - ${DATA_DIR:-./data/mainnet/gp5-hbss}/xdcchain:/work/xdcchain
    - ./genesis.json:/work/genesis.json:ro
    - ../geth-pr5/start-gp5.sh:/work/start.sh:ro
    - ./bootnodes.list:/work/bootnodes.list:ro
    - ${DATA_DIR:-./data/mainnet/gp5-hbss}/.pwd:/work/.pwd:ro
    - /etc/localtime:/etc/localtime:ro
    environment:
    - NETWORK=mainnet
    - NETWORK_ID=50
    - SYNC_MODE=full
    - GC_MODE=full
    - STATE_SCHEME=hash
    - CACHE=4096
    - MAXPEERS=50
    - HTTP_PORT=9745
    - WS_PORT=9746
    - AUTHRPC_PORT=${AUTHRPC_PORT:-9751}
    - P2P_PORT=30325
    - EXTERNAL_IP=${EXTERNAL_IP:-}
    - INSTANCE_NAME=${INSTANCE_NAME:-168-gp5-full-hbss-mainnet-168}
    - HTTP_API=admin,eth,net,web3,XDPoS
    - ETHSTATS_ENABLED=${ETHSTATS_ENABLED:-true}
    - STATS_SECRET=${STATS_SECRET:-xdc_openscan_stats_2026}
    - STATS_SERVER=${STATS_SERVER:-stats.xdcindia.com:443}
    - NO_DISCOVER=true
    - STATIC_NODES=${STATIC_NODES:-enode://ee1e11e3f56b015b2b391eb9c45292159713583b4adfe29d24675238f73d33e6ec0a62397847823e2bca622c91892075c517fc383c9355d43a89bb7532e834a0@157.173.120.219:30325,enode://729d763db071595bacbbf33037a8e7639d8e9a97bfcfcda3afe963435d919cb95634f27375f0aadf6494dad47e506c888bf15cb5633d5f81dbb793b05b27e676@207.90.192.100:30325,enode://49c7586c221250cac7070df41c1b6c77180c5d9051e20d1d2b77dfa0dc80b8dc48a8e3c7ca068ac757429223530d6445a06a32ab4af20819cfaa1d47282a0401@80.243.180.121:30325,enode://946cc4d00c4f3e9ffb50fda9d351672d8deaf546e3406228587f8e7131e3c1ad1a0f5ca2d0e2172463a04d747b3e7b29167d93684195952734f4535e7da58351@209.209.10.19:30325,enode://83a51d04ca4056d3630bc2f4e3028de4d041ab346fa5f7ca5bacfb88f4f30b6a055ec34e6350685103abf21cbfed2e79afa229df734909b659c81efc81d3df1c@38.143.58.153:30325,enode://266dfa5fd0152c3ec2b21ac71c5ae8c263c748b417feac2d2b6b3ff8b0d64e435e7d91d079856ec7a997d3f3ead62d5bd7922ffae7937893179b36d7ae7886e9@38.102.124.102:30325,enode://476328d1d7e38783b627241ec2ae1814ca535dd35ec1beb7942feb9a05b5af7634d465b5c10606f72cf0f25279cdbc53503e772ac2ad84beb46c7be654e3f9b7@172.98.12.15:30325,enode://a2267247a3bcc49909cd025de6db46001ff47ed9271ab0a1845a2915c381f29549d243708179c77aa1dda54d373aeff788abbc440c52f12ff98ae938fc06e5ce@185.198.27.214:30325,enode://cf97d46e2dbf9f81a1150d071458e4f95802826df163347fb241c74379fb72f8a0cf77e3a4af49c4ab68e330874e47fcc0db7acec026b055fc57abacfe08ebab@38.102.86.183:30325,enode://03acada1fdb36b32e2c69067e59338f22a986796202005fd882b2ef295f83f0db50ac09cd71af1e930e3bb15f805bc44f1da907460b007588d12d7efc8156d93@209.209.11.134:30325}
    - TRUSTED_NODES=${TRUSTED_NODES:-enode://ee1e11e3f56b015b2b391eb9c45292159713583b4adfe29d24675238f73d33e6ec0a62397847823e2bca622c91892075c517fc383c9355d43a89bb7532e834a0@157.173.120.219:30325,enode://729d763db071595bacbbf33037a8e7639d8e9a97bfcfcda3afe963435d919cb95634f27375f0aadf6494dad47e506c888bf15cb5633d5f81dbb793b05b27e676@207.90.192.100:30325,enode://49c7586c221250cac7070df41c1b6c77180c5d9051e20d1d2b77dfa0dc80b8dc48a8e3c7ca068ac757429223530d6445a06a32ab4af20819cfaa1d47282a0401@80.243.180.121:30325,enode://946cc4d00c4f3e9ffb50fda9d351672d8deaf546e3406228587f8e7131e3c1ad1a0f5ca2d0e2172463a04d747b3e7b29167d93684195952734f4535e7da58351@209.209.10.19:30325,enode://83a51d04ca4056d3630bc2f4e3028de4d041ab346fa5f7ca5bacfb88f4f30b6a055ec34e6350685103abf21cbfed2e79afa229df734909b659c81efc81d3df1c@38.143.58.153:30325,enode://266dfa5fd0152c3ec2b21ac71c5ae8c263c748b417feac2d2b6b3ff8b0d64e435e7d91d079856ec7a997d3f3ead62d5bd7922ffae7937893179b36d7ae7886e9@38.102.124.102:30325,enode://476328d1d7e38783b627241ec2ae1814ca535dd35ec1beb7942feb9a05b5af7634d465b5c10606f72cf0f25279cdbc53503e772ac2ad84beb46c7be654e3f9b7@172.98.12.15:30325,enode://a2267247a3bcc49909cd025de6db46001ff47ed9271ab0a1845a2915c381f29549d243708179c77aa1dda54d373aeff788abbc440c52f12ff98ae938fc06e5ce@185.198.27.214:30325,enode://cf97d46e2dbf9f81a1150d071458e4f95802826df163347fb241c74379fb72f8a0cf77e3a4af49c4ab68e330874e47fcc0db7acec026b055fc57abacfe08ebab@38.102.86.183:30325,enode://03acada1fdb36b32e2c69067e59338f22a986796202005fd882b2ef295f83f0db50ac09cd71af1e930e3bb15f805bc44f1da907460b007588d12d7efc8156d93@209.209.11.134:30325}
    entrypoint:
    - /bin/sh
    - /work/start.sh
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -qO- http://localhost:9745 --post-data=''{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}''
        --header=''Content-Type: application/json'' | grep -q ''result'' || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '5'
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 12G
        reservations:
          cpus: '2.0'
          memory: 8G
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
  skyone-168-gp5-full-hbss-mainnet-168:
    image: anilchinchawale/xdc-agent:v2.6
    container_name: skyone-168-gp5-full-hbss-mainnet-168
    restart: unless-stopped
    network_mode: host
    depends_on:
      168-gp5-full-hbss-mainnet-168:
        condition: service_healthy
    volumes:
    - ${DATA_DIR:-./data/mainnet/gp5-hbss}/skynet.conf:/etc/xdc-node/skynet.conf:ro
    environment:
    - RPC_URL=http://localhost:9745
    - NETWORK=mainnet
    - NODE_NAME=${NODE_NAME:-168-gp5-full-hbss-mainnet-168}
    - SKYNET_URL=${SKYNET_URL:-https://skynet.xdcindia.com}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
