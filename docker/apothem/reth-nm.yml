#==============================================================================
# XDC Apothem Testnet - Reth + Nethermind with SkyNet Agents
# Ports:
#   Reth:       RPC 8588, P2P 30309, WS 8589
#   Nethermind: RPC 8557, P2P 30308, WS 8559
#   SkyNet:     Reth agent 7078, NM agent 7079
#==============================================================================

version: '3.8'

services:
  # ==================== RETH APOTHEM ====================
  xdc-node-reth-apothem:
    image: anilchinchawale/rethx:apothem-cap-fix10
    platform: linux/amd64
    container_name: xdc-node-reth-apothem
    restart: unless-stopped
    ports:
      - "8588:8588"       # HTTP RPC
      - "8589:8589"       # WebSocket
      - "30309:30309"     # P2P TCP
      - "30309:30309/udp" # P2P UDP
      - "40304:40304/udp" # Discovery
    volumes:
      - /mnt/data/apothem-reth:/work/xdcchain
      - ./reth/start-reth-apothem.sh:/start.sh:ro
      - ./apothem/bootnodes.list:/work/bootnodes.list:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=apothem
      - SYNC_MODE=full
      - RPC_PORT=8588
      - P2P_PORT=30309
      - DISCOVERY_PORT=40304
      - INSTANCE_NAME=Reth_Apothem_Node
      - LOG_LEVEL=info
    entrypoint: ["/bin/bash", "/start.sh"]
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8588 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G

  # ==================== NETHERMIND APOTHEM ====================
  xdc-node-nethermind-apothem:
    image: anilchinchawale/nmx:apothem-peer-fix
    platform: linux/amd64
    container_name: xdc-node-nethermind-apothem
    restart: unless-stopped
    ports:
      - "8557:8557"       # HTTP RPC
      - "8559:8559"       # WebSocket
      - "30308:30308"     # P2P TCP
      - "30308:30308/udp" # P2P UDP
    volumes:
      - /mnt/data/apothem-nm:/nethermind/data
      - ./nethermind/xdc-apothem-chainspec.json:/nethermind/chainspec/xdc-apothem.json:ro
      - ./nethermind/xdc-apothem.cfg:/nethermind/configs/xdc-apothem.cfg:ro
      - ./apothem/bootnodes.list:/nethermind/bootnodes.list:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETHERMIND_CONFIG=xdc-apothem
      - NETWORK=apothem
    command: >
      --datadir=/nethermind/data
      --config=xdc-apothem
      --Init.ChainSpecPath=/nethermind/chainspec/xdc-apothem.json
      --Init.GenesisHash=0xbdea512b4f12ff1135ec92c00dc047ffb93890c2ea1aa0eefe9b013d80640075
      --Network.DiscoveryPort=30308
      --Network.P2PPort=30308
      --Network.Bootnodes=enode://ee1e11e3f56b015b2b391eb9c45292159713583b4adfe29d24675238f73d33e6ec0a62397847823e2bca622c91892075c517fc383c9355d43a89bb7532e834a0@157.173.120.219:30312,enode://729d763db071595bacbbf33037a8e7639d8e9a97bfcfcda3afe963435d919cb95634f27375f0aadf6494dad47e506c888bf15cb5633d5f81dbb793b05b27e676@207.90.192.100:30312,enode://49c7586c221250cac7070df41c1b6c77180c5d9051e20d1d2b77dfa0dc80b8dc48a8e3c7ca068ac757429223530d6445a06a32ab4af20819cfaa1d47282a0401@80.243.180.121:30312,enode://946cc4d00c4f3e9ffb50fda9d351672d8deaf546e3406228587f8e7131e3c1ad1a0f5ca2d0e2172463a04d747b3e7b29167d93684195952734f4535e7da58351@209.209.10.19:30312,enode://83a51d04ca4056d3630bc2f4e3028de4d041ab346fa5f7ca5bacfb88f4f30b6a055ec34e6350685103abf21cbfed2e79afa229df734909b659c81efc81d3df1c@38.143.58.153:30312
      --JsonRpc.Enabled=true
      --JsonRpc.Host=127.0.0.1
      --JsonRpc.Port=8557
      --JsonRpc.WebSocketsPort=8559
      --JsonRpc.EnabledModules=eth,net,web3,admin,txpool
      --Sync.FastSync=false
      --Sync.SnapSync=false
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8557 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G

  # ==================== SKYNET AGENT - RETH ====================
  skynet-agent-reth-apothem:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: skynet-agent-reth-apothem
    restart: unless-stopped
    ports:
      - "7078:3000"       # Dashboard port
    environment:
      - RPC_URL=http://xdc-node-reth-apothem:8588
      - NODE_RPC_PORT=8588
      - INSTANCE_NAME=Reth_Apothem_Node
      - SKYNET_API_URL=https://skynet.xdcindia.com/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - SKYNET_NODE_NAME=gcx-apothem-reth
      - XDC_CONTAINER_NAME=xdc-node-reth-apothem
      - NEXT_PUBLIC_REFRESH_INTERVAL=10
      - DASHBOARD_AUTH_ENABLED=false
    networks:
      - xdc-network
    depends_on:
      xdc-node-reth-apothem:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/live 2>/dev/null || (ps aux | grep -q '[n]ode' && exit 0) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ==================== SKYNET AGENT - NETHERMIND ====================
  skynet-agent-nethermind-apothem:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: skynet-agent-nethermind-apothem
    restart: unless-stopped
    ports:
      - "7079:3000"       # Dashboard port
    environment:
      - RPC_URL=http://xdc-node-nethermind-apothem:8557
      - NODE_RPC_PORT=8557
      - INSTANCE_NAME=Nethermind_Apothem_Node
      - SKYNET_API_URL=https://skynet.xdcindia.com/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - SKYNET_NODE_NAME=gcx-apothem-nethermind
      - XDC_CONTAINER_NAME=xdc-node-nethermind-apothem
      - NEXT_PUBLIC_REFRESH_INTERVAL=10
      - DASHBOARD_AUTH_ENABLED=false
    networks:
      - xdc-network
    depends_on:
      xdc-node-nethermind-apothem:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/live 2>/dev/null || (ps aux | grep -q '[n]ode' && exit 0) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  xdc-network:
    external: true
    name: docker_xdc-network
