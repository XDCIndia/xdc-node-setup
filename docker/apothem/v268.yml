# v2.6.8 Official Reference Node — Apothem (Testnet)
# Binary: XDC-testnet (NOT XDC or XDC-mainnet)
# v2.6.8 uses legacy flags: --rpc/--rpcaddr (NOT --http/--http.addr)
services:
  v268-apothem:
    container_name: ${LOCATION:-test}-v268-apothem-${SERVER_ID:-168}
    image: ${V268_IMAGE:-xinfinorg/xdposchain:v2.6.8}
    restart: unless-stopped
    stop_grace_period: 3m
    network_mode: host
    volumes:
      - ${DATA_ROOT:-/mnt/data}/apothem/v268:/work/xdcchain
    entrypoint: ["/usr/bin/XDC-testnet"]
    command: >
      --datadir /work/xdcchain --networkid 51
      --syncmode full --gcmode full
      --port ${V268_APOTHEM_P2P:-30320}
      --cache ${CACHE:-4096}
      --rpc --rpcaddr 0.0.0.0 --rpcport ${V268_APOTHEM_RPC:-8650}
      --rpccorsdomain "*" --rpcvhosts "*"
      --rpcapi eth,net,web3,debug,txpool,admin
      --ws --wsaddr 0.0.0.0 --wsport ${V268_APOTHEM_WS:-8651} --wsorigins "*"
      --wsapi eth,net,web3
      --maxpeers 50 --verbosity 3
      --bootnodes "${BOOTNODES:-}"
      --ethstats "${LOCATION:-test}-v268-apothem-${SERVER_ID:-168}:${ETHSTATS_SECRET:-xdc_openscan_stats_2026}@${ETHSTATS_HOST:-stats.xdcindia.com:443}"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
