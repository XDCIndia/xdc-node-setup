#==============================================================================
# XDC Node Docker Compose — GP5 Client (HBSS) on Apothem (Testnet)
# Hash-based state scheme, no-discover, static peer to local v268
# XNS naming: 168-gp5-full-hbss-apothem-168
#==============================================================================

services:
  168-gp5-full-hbss-apothem-168:
    image: anilchinchawale/gp5-xdc:v36
    platform: linux/amd64
    container_name: 168-gp5-full-hbss-apothem-168
    restart: always
    network_mode: host
    volumes:
      - ${DATA_DIR:-./data/apothem/gp5-hbss}/xdcchain:/work/xdcchain
      - ./genesis.json:/work/genesis.json:ro
      - ../geth-pr5/start-gp5.sh:/work/start.sh:ro
      - ./bootnodes.list:/work/bootnodes.list:ro
      - ${DATA_DIR:-./data/apothem/gp5-hbss}/.pwd:/work/.pwd:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=apothem
      - NETWORK_ID=51
      - SYNC_MODE=full
      - GC_MODE=full
      - STATE_SCHEME=hash
      - CACHE=4096
      - MAXPEERS=50
      - HTTP_PORT=9545
      - WS_PORT=9546
      - AUTHRPC_PORT=8551
      - P2P_PORT=30321
      - EXTERNAL_IP=${EXTERNAL_IP:-}
      - INSTANCE_NAME=${INSTANCE_NAME:-168-gp5-full-hbss-apothem-168}
      - HTTP_API=admin,eth,net,web3,xdpos
      - ETHSTATS_ENABLED=${ETHSTATS_ENABLED:-true}
      - STATS_SECRET=${STATS_SECRET:-xdc_openscan_stats_2026}
      - STATS_SERVER=${STATS_SERVER:-stats.xdcindia.com:443}
      - NO_DISCOVER=false
      - STATIC_NODES=${STATIC_NODES:-}
      - TRUSTED_NODES=${TRUSTED_NODES:-}
    entrypoint: ["/bin/sh", "/work/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  skyone-168-gp5-full-hbss-apothem-168:
    image: anilchinchawale/xdc-agent:v2.6
    container_name: skyone-168-gp5-full-hbss-apothem-168
    restart: always
    network_mode: host
    depends_on:
      168-gp5-full-hbss-apothem-168:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data/apothem/gp5-hbss}/skynet.conf:/etc/xdc-node/skynet.conf:ro
    environment:
      - RPC_URL=http://localhost:9545
      - NETWORK=apothem
      - NODE_NAME=${NODE_NAME:-168-gp5-full-hbss-apothem-168}
      - SKYNET_URL=${SKYNET_URL:-https://net.xdc.network}
