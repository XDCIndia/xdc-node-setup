version: "3.8"

# XDC Node Log Aggregation Stack
# Loki + Promtail + Grafana for centralized log management
#
# Usage:
#   docker compose -f docker-compose.logging.yml up -d
#
# Or with xdc CLI:
#   xdc start --logging

services:
  # ============================================
  # Loki - Log Aggregation Backend
  # ============================================
  loki:
    image: grafana/loki:2.9.4
    container_name: xdc-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ../configs/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q 'ready'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - xdc-logging

  # ============================================
  # Promtail - Log Collector Agent
  # ============================================
  promtail:
    image: grafana/promtail:2.9.4
    container_name: xdc-promtail
    restart: unless-stopped
    volumes:
      - ../configs/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # XDC node logs (adjust paths as needed)
      - ${XDC_DATA_DIR:-/xdcchain}:/xdcchain:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - xdc-logging

  # ============================================
  # Grafana - Log Visualization
  # ============================================
  grafana-logs:
    image: grafana/grafana:10.3.1
    container_name: xdc-grafana-logs
    restart: unless-stopped
    ports:
      - "3200:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Error: GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3200}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-logs-data:/var/lib/grafana
      - ../configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - xdc-logging

volumes:
  loki-data:
    name: xdc-loki-data
  grafana-logs-data:
    name: xdc-grafana-logs-data

networks:
  xdc-logging:
    name: xdc-logging
    driver: bridge
