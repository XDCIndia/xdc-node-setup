# Standalone NetOwn Agent
# For adding monitoring to an existing XDC node
# Usage: docker compose -f netown-agent-standalone.yml up -d

services:
  netown-agent:
    image: alpine:3.19
    container_name: netown-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./netown-agent.sh:/agent.sh:ro
      - ./netown.conf:/etc/xdc-node/netown.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/ssh/sshd_config:/host/sshd_config:ro
      - /proc:/host/proc:ro
    environment:
      - NETOWN_CONF=/etc/xdc-node/netown.conf
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash curl jq bc procps >/dev/null 2>&1
        chmod +x /agent.sh
        echo "NetOwn Agent started - reporting every 60s"
        while true; do
          /agent.sh 2>/dev/null
          sleep 60
        done
