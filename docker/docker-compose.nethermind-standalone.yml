#==============================================================================
# XDC Node Docker Compose — Nethermind Standalone (alongside Geth/Erigon)
# Usage: docker compose -f docker-compose.nethermind-standalone.yml up -d
# Runs Nethermind + SkyOne agent WITHOUT replacing the default geth node
#==============================================================================

services:
  xdc-node-nethermind:
    image: anilchinchawale/nmx:latest
    platform: linux/amd64
    container_name: xdc-node-nethermind
    restart: always
    ports:
      - "0.0.0.0:${NETHERMIND_P2P_PORT:-30306}:30303"
      - "0.0.0.0:${NETHERMIND_P2P_PORT:-30306}:30303/udp"
      - "0.0.0.0:${NETHERMIND_RPC_PORT:-8558}:8545"
    volumes:
      - ../${NETWORK:-mainnet}/nethermind-db:/nethermind/data
      - ./nethermind/start-nethermind.sh:/start.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/nethermind.json:/nethermind/configs/xdc.json:ro
      - ./${NETWORK:-mainnet}/bootnodes.list:/nethermind/bootnodes.list:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - SYNC_MODE=${SYNC_MODE:-full}
      - RPC_PORT=8545
      - INSTANCE_NAME=${INSTANCE_NAME:-Nethermind_XDC_Node}
      - P2P_PORT=30303
      - NETHERMIND_JSONRPCCONFIG_ENABLEDMODULES=eth,net,web3,admin,debug,trace,txpool
    entrypoint: ["/bin/bash", "/start.sh"]
    networks:
      - docker_xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G

  xdc-agent-nethermind:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: xdc-agent-nethermind
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NETHERMIND_DASHBOARD_PORT:-7072}:3000"
    volumes:
      - ./skynet-agent.sh:/agent.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/skynet-nethermind.conf:/etc/xdc-node/skynet.conf
      - /proc:/host/proc:ro
      # Security (#499): docker.sock required for xdc-agent container monitoring — see docs/SECURITY.md
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../${NETWORK:-mainnet}/.xdc-node/logs:/var/log/xdc
    environment:
      - RPC_URL=http://xdc-node-nethermind:8545
      - NODE_RPC_PORT=8545
      - INSTANCE_NAME=${INSTANCE_NAME:-Nethermind_XDC_Node}
      - SKYNET_CONF=/etc/xdc-node/skynet.conf
      - SKYNET_API_KEY=${SKYNET_API_KEY:-}
      - SKYNET_NODE_ID=${SKYNET_NODE_ID:-}
      - SKYNET_NODE_NAME=${SKYNET_NODE_NAME:-xdc-nethermind-168-mainnet}
      - XDC_CONTAINER_NAME=xdc-node-nethermind
      - NEXT_PUBLIC_REFRESH_INTERVAL=10
      - DASHBOARD_AUTH_ENABLED=${DASHBOARD_AUTH_ENABLED:-false}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-xdc-skyone}
    networks:
      - docker_xdc-network
    depends_on:
      xdc-node-nethermind:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/live 2>/dev/null || (ps aux | grep -q '[n]ode' && exit 0) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  docker_xdc-network:
    external: true
