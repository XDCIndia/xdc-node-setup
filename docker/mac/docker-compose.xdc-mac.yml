version: '3.8'

# XDC Multi-Client Docker Compose
# Images: anilchinchawale/gx, anilchinchawale/nmx, anilchinchawale/erix

services:
  # XDC Geth (gx)
  xdc-geth:
    image: anilchinchawale/gx:stable
    container_name: xdc-geth
    restart: unless-stopped
    ports:
      - "8545:8545"    # HTTP RPC
      - "8546:8546"    # WebSocket
      - "30303:30303"  # P2P TCP
      - "30303:30303/udp"  # P2P UDP
    volumes:
      - ./data/geth:/data/xdcchain
    command: >
      --datadir=/data/xdcchain
      --networkid=51
      --port=30303
      --http
      --http.addr=127.0.0.1
      --http.port=8545
      --http.vhosts="*"
      --http.corsdomain="*"
      --http.api=eth,net,web3,txpool,debug
      --ws
      --ws.addr=127.0.0.1
      --ws.port=8546
      --ws.origins="*"
    networks:
      - xdc-network

  # XDC Nethermind (nmx)
  xdc-nethermind:
    image: anilchinchawale/nmx:stable
    container_name: xdc-nethermind
    restart: unless-stopped
    ports:
      - "8557:8557"    # HTTP RPC
      - "8558:8558"    # WebSocket
      - "30305:30305"  # P2P
    volumes:
      - ./data/nethermind:/data/nethermind
      - ./config/nethermind.json:/config/nethermind.json:ro
    command:
      - --config=/config/nethermind.json
    networks:
      - xdc-network

  # XDC Erigon (erix)
  xdc-erigon:
    image: anilchinchawale/erix:stable
    container_name: xdc-erigon
    restart: unless-stopped
    ports:
      - "8555:8555"    # HTTP RPC
      - "8556:8556"    # WebSocket
      - "9090:9090"    # Private API
      - "6060:6060"    # Metrics
      - "30304:30304"  # P2P
    volumes:
      - ./data/erigon:/data/erigon
    command: >
      --datadir=/data/erigon
      --chain=xdc-apothem
      --networkid=51
      --port=30304
      --http
      --http.addr=127.0.0.1
      --http.port=8555
      --http.vhosts="*"
      --http.corsdomain="*"
      --http.api=eth,net,web3,txpool,debug,erigon
      --ws
      --metrics
      --metrics.addr=127.0.0.1
      --metrics.port=6060
    networks:
      - xdc-network

networks:
  xdc-network:
    driver: bridge
