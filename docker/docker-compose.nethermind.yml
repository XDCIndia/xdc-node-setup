#==============================================================================
# XDC Node Docker Compose — Nethermind Client Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.nethermind.yml up -d
# Or simply: xdc start --client nethermind
#
# XDC Sync Fixes (March 2026):
# - XDC_BYPASS_STATE_ROOT: Enable state root bypass for checkpoint blocks during sync
# - XDC_CHECKPOINT_AUTH_BYPASS: Skip auth validation at checkpoints (1800, 62101, 3000000)
# - Enhanced state root cache for PR54 inbound sync handling
#==============================================================================

services:
  xdc-node:
    image: anilchinchawale/nmx:latest
    platform: linux/amd64
    container_name: xdc-node-nethermind
    restart: always
    ports:
      - "0.0.0.0:${NETHERMIND_P2P_PORT:-30306}:30303"
      - "0.0.0.0:${NETHERMIND_P2P_PORT:-30306}:30303/udp"
      - "127.0.0.1:${NETHERMIND_RPC_PORT:-8556}:8545"
    volumes:
      - ../${NETWORK:-mainnet}/nethermind-db:/nethermind/data
      - ./nethermind/start-nethermind.sh:/start.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/nethermind.json:/nethermind/configs/xdc.json:ro
      - ./${NETWORK:-mainnet}/bootnodes.list:/nethermind/bootnodes.list:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - SYNC_MODE=${SYNC_MODE:-full}
      - RPC_PORT=8545
      - INSTANCE_NAME=${INSTANCE_NAME:-Nethermind_XDC_Node}
      - P2P_PORT=30303
      - NETHERMIND_JSONRPCCONFIG_ENABLEDMODULES=eth,net,web3,admin,debug,trace,txpool
      # XDCSync Fixes: Enable state root bypass for checkpoint blocks during sync
      # Set to "true" to bypass state root validation at known checkpoints (1800, 62101, 3000000)
      # This helps sync past divergent state roots between Nethermind and geth
      - XDC_BYPASS_STATE_ROOT=${XDC_BYPASS_STATE_ROOT:-true}
      # Enable checkpoint auth bypass for V1/V2 transition sync
      - XDC_CHECKPOINT_AUTH_BYPASS=${XDC_CHECKPOINT_AUTH_BYPASS:-true}
      # XDCSync: Log level for sync-related debugging (Debug/Info/Warn/Error)
      - XDC_SYNC_LOG_LEVEL=${XDC_SYNC_LOG_LEVEL:-Info}
    entrypoint: ["/bin/bash", "/start.sh"]
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # SkyOne agent for Nethermind — connects to nethermind's internal RPC
  xdc-agent:
    container_name: xdc-agent-nethermind
    ports:
      - "127.0.0.1:${NETHERMIND_DASHBOARD_PORT:-7072}:3000"
    volumes:
      - ./skynet-agent.sh:/agent.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/skynet-nethermind.conf:/etc/xdc-node/skynet.conf
      - /proc:/host/proc:ro
      # Security (#499): docker.sock required for xdc-agent container monitoring — see docs/SECURITY.md
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../${NETWORK:-mainnet}/.xdc-node/logs:/var/log/xdc
    environment:
      - RPC_URL=http://xdc-node:8545
      - NODE_RPC_PORT=8545
      - INSTANCE_NAME=${INSTANCE_NAME:-Nethermind_XDC_Node}
      - SKYNET_CONF=/etc/xdc-node/skynet.conf
      - SKYNET_API_KEY=${SKYNET_API_KEY:-}
      - SKYNET_NODE_ID=${SKYNET_NODE_ID:-}
      - SKYNET_NODE_NAME=${SKYNET_NODE_NAME:-xdc-nethermind-168-mainnet}
      - XDC_CONTAINER_NAME=xdc-node-nethermind
      - NEXT_PUBLIC_REFRESH_INTERVAL=10
      - DASHBOARD_AUTH_ENABLED=${DASHBOARD_AUTH_ENABLED:-false}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-xdc-skyone}
    depends_on:
      xdc-node:
        condition: service_started

networks:
  xdc-network:
    driver: bridge
