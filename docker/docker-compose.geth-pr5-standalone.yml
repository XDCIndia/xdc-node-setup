#==============================================================================
# XDC Node Docker Compose — Geth PR5 Standalone
# Usage: docker compose -f docker-compose.geth-pr5-standalone.yml up -d
# Or: xdc start --client geth-pr5
# Runs alongside existing geth v2.6.8 on different ports
#==============================================================================

services:
  xdc-node-geth-pr5:
    image: anilchinchawale/gx:latest
    platform: linux/amd64
    container_name: xdc-node-geth-pr5
    restart: unless-stopped
    ports:
      - "${GP5_P2P_PORT:-30307}:30307"
      - "${GP5_P2P_PORT:-30307}:30307/udp"
      - "127.0.0.1:${GP5_RPC_PORT:-8557}:8557"
      - "127.0.0.1:${GP5_WS_PORT:-8560}:8560"
    volumes:
      - ../${NETWORK:-mainnet}/geth-pr5-data:/data/xdc
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - NETWORK_ID=${NETWORK_ID:-50}
      - APOTHEM_FLAG=${APOTHEM_FLAG:-}
      - STATE_SCHEME=${STATE_SCHEME:-auto}
    entrypoint: ["/usr/local/bin/XDC"]
    command:
      - --datadir=/data/xdc
      - --networkid=${NETWORK_ID:-50}
      - --port=30307
      - --http
      - --http.addr=127.0.0.1
      - --http.port=8557
      - --http.vhosts=*
      - --http.corsdomain=*
      - --http.api=eth,net,web3,txpool,debug,admin
      - --ws
      - --ws.addr=127.0.0.1
      - --ws.port=8560
      - --ws.origins=*
      - --syncmode=full
      - --state.scheme=${STATE_SCHEME:-hash}
      - --cache=4096
      - --maxpeers=100
      - --snapshot=false
      - --verbosity=3
      - --bootnodes=enode://e1a69a7d766576e694adc3fc78d801a8a66926cbe8f4fe95b85f3b481444700a5d1b6d440b2715b5bb7cf4824df6a6702740afc8c52b20c72bc8c16f1ccde1f3@149.102.140.32:30303,enode://874589626a2b4fd7c57202533315885815eba51dbc434db88bbbebcec9b22cf2a01eafad2fd61651306fe85321669a30b3f41112eca230137ded24b86e064ba8@5.189.144.192:30303,enode://ccdef92053c8b9622180d02a63edffb3e143e7627737ea812b930eacea6c51f0c93a5da3397f59408c3d3d1a9a381f7e0b07440eae47314685b649a03408cfdd@37.60.243.5:30303,enode://12711126475d7924af98d359e178f71c5d9607de32d2c5b4ab1afff4b0bb16b793b4bbda0a42bf41a309e5349b6106d053ae4ae92aa848b5879e3ef3687c6203@89.117.49.48:30303,enode://81edfecc3df6994679daf67858ae34c0ae91aac944a84b09171532b45ad0f5d0c896eb8c023df04eaa2db743f5fccdf18cf7e2d12120d37a2c142a3be0a348cd@38.102.87.174:30303,enode://053ba696174e7f115e38f0e3963d0035ac20dc18e9a5c5873f9e90fe338d777f726d68d053c987416ec0bd97d4d818c59a8a23bc9ea854069ea2310846e27e7d@162.250.189.221:30303,enode://b3ce1f8894af033cc2adbcb0836fe18d283af8574c451e385fd362165a6e5eded1b59b640c4d92048283bad9855721345a28ebaf28f66ace00a7134871d1e2a2@38.143.58.166:30303,enode://938f2e3f409a12573e6da6460b6497c45e2bec393756b989b8874f647911cca39d0ffef8554a45698a8f21a7e870288beb638b3770537a12118e30bd6f9ae806@109.199.104.176:30303,enode://47350ef305fb1406818a621a0f11144a72d560835a860607b331cef46ac82ea79c7df6bb5e5dba4147a489d9c77bc527f2500ce753fece817bc1a890eb05b886@185.252.233.29:30303,enode://0857894c01314e75520fbdb7e37869666f230c8ab96c0e3067561077209e8f48a9cefb3a71c3c8094448629c152f22c2e5e66bb7ed2c38bfbd9f24941f571beb@103.7.54.103:30303
    networks:
      - docker_xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8557 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  xdc-agent-geth-pr5:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: xdc-agent-geth-pr5
    restart: unless-stopped
    ports:
      - "0.0.0.0:${GP5_DASHBOARD_PORT:-7070}:3000"
    volumes:
    environment:
      - RPC_URL=http://xdc-node-geth-pr5:8557
      - SKYNET_NODE_NAME=${SKYNET_NODE_NAME:-xdc-geth-pr5}
      - SKYNET_API_URL=https://skynet.xdcindia.com/api
      - SKYNET_MASTER_KEY=${SKYNET_MASTER_KEY:-xdc-netown-key-2026-prod}
      - XDC_CONTAINER_NAME=xdc-node-geth-pr5
    networks:
      - docker_xdc-network
    depends_on:
      xdc-node-geth-pr5:
        condition: service_started

networks:
  docker_xdc-network:
    external: true
