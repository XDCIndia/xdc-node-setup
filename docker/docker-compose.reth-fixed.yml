services:
  xdc-node:
    image: anilchinchawale/rethx:latest
    platform: linux/amd64
    container_name: xdc-node-reth
    restart: unless-stopped
    ports:
      - "${RETH_P2P_PORT:-40303}:40303"
      - "${RETH_P2P_PORT:-40303}:40303/udp"
      - "${RETH_DISCOVERY_PORT:-40304}:40304/udp"
      - "0.0.0.0:${RETH_RPC_PORT:-7073}:7073"
    volumes:
      - ../${NETWORK:-mainnet}/reth-db:/work/xdcchain
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - RPC_PORT=7073
      - P2P_PORT=40303
      - DISCOVERY_PORT=40304
    command: >
      xdc-reth node
      --datadir /work/xdcchain
      --chain xdc-mainnet
      --http
      --http.addr 127.0.0.1
      --http.port 7073
      --http.api "eth,net,web3,admin"
      --port 40303
      --discovery.port 40304
      --bootnodes "enode://f164c4adb9c873ee08871bea823e1d6fecfbfbc7a3520107eda1563f1d845d0774042aeadc9b3803ef23e820b528b191ca74ed74bca0c57cc84084ba3061ff5b@65.21.27.213:30303,enode://fd601f09148a5e958ce86f115e4ad473e7e5baa4dbad9cfceb7024ba188455e68c3f5e091072ac9bf8620778a7f03847a6ad14f3cdc9c7ef1d446c68041ab88d@185.180.220.183:30303"
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7073 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  xdc-agent:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: xdc-agent-reth
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./skynet-agent.sh:/agent.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/skynet-reth.conf:/etc/xdc-node/skynet.conf
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - ../${NETWORK:-mainnet}/.xdc-node/logs:/var/log/xdc
    environment:
      - RPC_URL=http://127.0.0.1:7073
      - NODE_RPC_PORT=7073
      - INSTANCE_NAME=Reth_XDC_Node
      - SKYNET_CONF=/etc/xdc-node/skynet.conf
      - SKYNET_API_KEY=${SKYNET_API_KEY:-}
      - SKYNET_NODE_ID=${SKYNET_NODE_ID:-}
      - SKYNET_NODE_NAME=xdc-reth-mainnet
      - XDC_CONTAINER_NAME=xdc-node-reth
    depends_on:
      xdc-node:
        condition: service_started

networks:
  xdc-network:
    driver: bridge
