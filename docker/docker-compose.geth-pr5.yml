#==============================================================================
# XDC Node Docker Compose — Geth PR5 Client
# Usage: docker compose -f docker-compose.geth-pr5.yml up -d
# Or: xdc start --client geth-pr5
#==============================================================================

services:
  xdc-node:
    image: anilchinchawale/gx:latest
    platform: linux/amd64
    container_name: xdc-node-geth-pr5
    restart: unless-stopped
    ports:
      - "0.0.0.0:${P2P_PORT:-30303}:30303"
      - "0.0.0.0:${P2P_PORT:-30303}:30303/udp"
      - "${RPC_BIND:-127.0.0.1}:${RPC_PORT:-8545}:8545"
      - "${WS_BIND:-127.0.0.1}:${WS_PORT:-8546}:8546"
    volumes:
      - ${DATA_DIR:-../mainnet}/xdcchain:/work/xdcchain
      - ./mainnet/genesis.json:/work/genesis.json:ro
      - ./geth-pr5/start-geth-pr5.sh:/work/start.sh:ro
      - ./mainnet/bootnodes.list:/work/bootnodes.list:ro
      - ${DATA_DIR:-../mainnet}/.xdc-node/.pwd:/work/.pwd:ro
      - ${DATA_DIR:-../mainnet}/.xdc-node/config.toml:/etc/xdc-node/config.toml:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - NETWORK_ID=${NETWORK_ID:-50}
      - SYNC_MODE=${SYNC_MODE:-full}
      - GC_MODE=${GC_MODE:-full}
      - EXTERNAL_IP=${EXTERNAL_IP:-}
      - INSTANCE_NAME=${INSTANCE_NAME:-XDC_Geth_PR5}
      - HTTP_API=${HTTP_API:-admin,eth,net,web3,XDPoS}
    entrypoint: ["/bin/sh", "/work/start.sh"]
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # SkyNet monitoring agent
  xdc-agent:
    image: anilchinchawale/xdc-agent:v2.6
    container_name: xdc-agent-gp5
    restart: unless-stopped
    network_mode: host
    depends_on:
      xdc-node:
        condition: service_healthy
    environment:
      - RPC_URL=http://localhost:${RPC_PORT:-8545}
      - NETWORK=${NETWORK:-mainnet}
      - NODE_NAME=${NODE_NAME:-xdc-geth-pr5}
      - SKYNET_URL=${SKYNET_URL:-https://skynet.xdcindia.com}

networks:
  xdc-network:
    driver: bridge
