#==============================================================================
# Standalone SkyNet Agent - Docker Compose
#
# For adding XDC SkyNet fleet monitoring to an existing XDC node that was NOT
# deployed via the XDC-Node-Setup docker-compose.yml (which has a built-in
# skynet profile). Use this for nodes running natively or via other setups.
#
# Prerequisites:
#   1. Copy skynet-agent.sh to the same directory as this file
#   2. Copy your skynet.conf (with API keys) to the same directory
#   3. Ensure the XDC node RPC is accessible at the URL in skynet.conf
#
# Usage:
#   docker compose -f skynet-agent-standalone.yml up -d
#   docker logs -f skynet-agent
#
# To stop:
#   docker compose -f skynet-agent-standalone.yml down
#==============================================================================

services:
  skynet-agent:
    image: alpine:3.19
    container_name: skynet-agent
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Use host.docker.internal to access host services instead of localhost
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
    networks:
      - xdc-network
    volumes:
      - ./skynet-agent.sh:/agent.sh:ro
      - ./skynet.conf:/etc/xdc-node/skynet.conf:ro
      - /etc/ssh/sshd_config:/host/sshd_config:ro      # Security audit checks
      - /proc:/host/proc:ro                              # System metrics
    environment:
      - SKYNET_CONF=/etc/xdc-node/skynet.conf
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash curl jq bc procps >/dev/null 2>&1
        echo "SkyNet Agent started - reporting every 60s"
        while true; do
          /agent.sh 2>/dev/null && echo "[$(date '+%H:%M:%S')] heartbeat ok" || echo "[$(date '+%H:%M:%S')] heartbeat failed"
          sleep 60
        done
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'sleep 60' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.xdc-node-setup.service: "skynet-agent"
      com.xdc-node-setup.version: "1.0.0"
      com.xdc-node-setup.description: "XDC SkyNet fleet monitoring sidecar"

#==============================================================================
# Networks
#==============================================================================
networks:
  xdc-network:
    driver: bridge
