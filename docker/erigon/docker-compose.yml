version: '3.8'

services:
  erigon:
    image: xdc-erigon:latest
    container_name: xdc-node-erigon
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    
    ports:
      - "127.0.0.1:8545:8545"     # HTTP RPC
      - "127.0.0.1:8551:8551"     # Engine API (authrpc)
      - "0.0.0.0:30303:30303"     # P2P TCP
      - "0.0.0.0:30303:30303/udp" # P2P UDP
      - "0.0.0.0:30304:30304"     # Sentry eth/63
      - "0.0.0.0:30304:30304/udp"
      - "0.0.0.0:30311:30311"     # Sentry eth/68
      - "0.0.0.0:30311:30311/udp"
      - "127.0.0.1:9090:9090"     # gRPC (diagnostics)
      - "127.0.0.1:6060:6060"     # Metrics (pprof)
    
    volumes:
      - ${XDC_DATA_DIR:-./data}:/work/xdcchain
      
    environment:
      - XDC_DATADIR=/work/xdcchain
      
    command: >
      --chain=xdc
      --datadir=/work/xdcchain
      --http
      --http.addr=0.0.0.0
      --http.port=8545
      --http.api=eth,debug,net,trace,web3,erigon
      --http.vhosts=*
      --http.corsdomain=*
      --authrpc.addr=0.0.0.0
      --authrpc.port=8551
      --authrpc.vhosts=*
      --private.api.addr=0.0.0.0:9090
      --metrics
      --metrics.addr=0.0.0.0
      --metrics.port=6060
      --pprof
      --pprof.addr=0.0.0.0
      --pprof.port=6060
      --maxpeers=100
      --db.size.limit=8TB
      --torrent.download.rate=512mb
      --torrent.upload.rate=512mb
      
    networks:
      - xdc-network
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8545 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  xdc-network:
    driver: bridge
