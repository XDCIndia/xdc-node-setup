version: '3.8'

# Apothem Testnet Multi-Client Docker Compose
# Geth (XDC v2.6.8) + Geth PR5 + Erigon + Nethermind
# Works on Linux AND macOS (ARM64/Rosetta via platform: linux/amd64)

services:
  # ==================== GETH v2.6.8 APOTHEM ====================
  xdc-node-apothem:
    image: xinfinorg/xdposchain:v2.6.8
    platform: linux/amd64
    container_name: xdc-node-apothem
    restart: unless-stopped
    ports:
      - "127.0.0.1:8545:8545"      # HTTP RPC - exposed on all interfaces
      - "127.0.0.1:8546:8546"      # WebSocket  
      - "30303:30303"            # P2P TCP - enode port
      - "30303:30303/udp"        # P2P UDP
    volumes:
      - xdc-apothem-data:/work/xdcchain
      - ./apothem/genesis.json:/work/genesis.json:ro
      - ./apothem/bootnodes.list:/work/bootnodes.list:ro
    environment:
      - NETWORK=apothem
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # v2.6.8 image has XDC-testnet binary
        BINARY=$$(which XDC-testnet 2>/dev/null || which XDC 2>/dev/null || echo "/usr/bin/XDC-testnet")
        exec $$BINARY \
          --datadir /work/xdcchain \
          --networkid 51 \
          --port 30303 \
          --rpc --rpcaddr 0.0.0.0 --rpcport 8545 \
          --rpccorsdomain "*" --rpcvhosts "*" \
          --rpcapi eth,net,web3,debug,txpool,admin \
          --ws --wsaddr 0.0.0.0 --wsport 8546 --wsorigins "*" \
          --syncmode full \
          --apothem \
          --bootnodes "enode://ee1e11e3f56b015b2b391eb9c45292159713583b4adfe29d24675238f73d33e6ec0a62397847823e2bca622c91892075c517fc383c9355d43a89bb7532e834a0@157.173.120.219:30312,enode://729d763db071595bacbbf33037a8e7639d8e9a97bfcfcda3afe963435d919cb95634f27375f0aadf6494dad47e506c888bf15cb5633d5f81dbb793b05b27e676@207.90.192.100:30312,enode://49c7586c221250cac7070df41c1b6c77180c5d9051e20d1d2b77dfa0dc80b8dc48a8e3c7ca068ac757429223530d6445a06a32ab4af20819cfaa1d47282a0401@80.243.180.121:30312"
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== GETH PR5 APOTHEM (v34 with geth binary) ====================
  xdc-node-gx-apothem:
    image: anilchinchawale/gp5-xdc:v94-amd64
    platform: linux/amd64
    container_name: xdc-node-gx-apothem
    restart: unless-stopped
    ports:
      - "127.0.0.1:9545:9545"      # HTTP RPC - XNS Standard port
      - "127.0.0.1:9546:9546"      # WebSocket - XNS Standard port
      - "30307:30307"    # P2P TCP
      - "30307:30307/udp"  # P2P UDP
    volumes:
      - xdc-gx-apothem-data:/data
    environment:
      - STATE_SCHEME=${STATE_SCHEME:-auto}
    # Entrypoint script handles XDC -> geth directory migration automatically
    command:
      - --datadir=/data
      - --networkid=51
      - --port=30307
      - --http
      - --http.addr=0.0.0.0
      - --http.port=9545
      - --http.vhosts=*
      - --http.corsdomain=*
      - --http.api=eth,net,web3,txpool,debug,admin
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=9546
      - --ws.origins=*
      - --syncmode=full
      - --state.scheme=${STATE_SCHEME:-hash}
      - --apothem
      - --ethstats=xdc03-gp5-apothem-v34:xdc_openscan_stats_2026@stats.xdcindia.com:443
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:9545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== ERIGON APOTHEM ====================
  xdc-node-erigon-apothem:
    image: anilchinchawale/erix:latest
    platform: linux/amd64
    container_name: xdc-node-erigon-apothem
    restart: unless-stopped
    ports:
      - "127.0.0.1:8556:8556"      # HTTP RPC - exposed on all interfaces
      - "127.0.0.1:8560:8559"      # WebSocket
      - "30306:30306"            # P2P TCP - enode port
      - "30306:30306/udp"        # P2P UDP
      - "127.0.0.1:9090:9090"              # Private API
      - "127.0.0.1:6060:6060"              # Metrics
    volumes:
      - xdc-erigon-apothem-data:/data/erigon
    environment:
      - NETWORK=apothem
    command: >
      --datadir=/data/erigon
      --chain=xdc-apothem
      --networkid=51
      --port=30306
      --http
      --http.addr=0.0.0.0
      --http.port=8556
      --http.vhosts="*"
      --http.corsdomain="*"
      --http.api=eth,net,web3,txpool,debug,erigon,admin
      --ws
      --ws.addr=0.0.0.0
      --ws.port=8559
      --metrics
      --metrics.addr=0.0.0.0
      --metrics.port=6060
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8556 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ==================== NETHERMIND APOTHEM ====================
  xdc-node-nethermind-apothem:
    image: anilchinchawale/nmx:latest
    platform: linux/amd64
    container_name: xdc-node-nethermind-apothem
    restart: unless-stopped
    ports:
      - "127.0.0.1:8558:8558"      # HTTP RPC - exposed on all interfaces
      - "127.0.0.1:8560:8559"      # WebSocket
      - "30308:30308"            # P2P TCP - enode port
      - "30308:30308/udp"        # P2P UDP
    volumes:
      - xdc-nethermind-apothem-data:/nethermind/data
    command: >
      --config xdc
      --datadir /nethermind/data
      --Network.DiscoveryPort=30308
      --Network.P2PPort=30308
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8558
      --JsonRpc.WebSocketsPort=8559
      --JsonRpc.EnabledModules="eth,net,web3,admin,txpool"
      --Sync.FastSync=false
      --Sync.SnapSync=false
      --Network.StaticPeers="enode://91e59fa1b034ae35e9f4e8a99cc6621f09d74e76a6220abb6c93b29ed41a9e1fc4e5b70e2c5fc43f883cffbdcd6f4f6cbc1d23af077f28c2aecc22403355d4b1@xdc-node-apothem:30303"
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8558 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # ==================== PEER CONNECTOR ====================
  # Automatically adds peers between all clients
  # ==================== SKYNET AGENTS ====================
  skynet-agent-geth:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: skynet-agent-geth
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - RPC_URL=http://xdc-node-apothem:8545
      - SKYNET_NODE_NAME=local-apothem-geth
      - SKYNET_API_URL=https://skynet.xdcindia.com/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - XDC_CONTAINER_NAME=xdc-node-apothem
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy

  skynet-agent-gx:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: skynet-agent-gx
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - RPC_URL=http://xdc-node-gx-apothem:9545
      - SKYNET_NODE_NAME=local-apothem-gx
      - SKYNET_API_URL=https://skynet.xdcindia.com/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - XDC_CONTAINER_NAME=xdc-node-gx-apothem
    networks:
      - xdc-network
    depends_on:
      xdc-node-gx-apothem:
        condition: service_healthy

  skynet-agent-erigon:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: skynet-agent-erigon
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - RPC_URL=http://xdc-node-erigon-apothem:8556
      - SKYNET_NODE_NAME=local-apothem-erigon
      - SKYNET_API_URL=https://skynet.xdcindia.com/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - XDC_CONTAINER_NAME=xdc-node-erigon-apothem
    networks:
      - xdc-network
    depends_on:
      xdc-node-erigon-apothem:
        condition: service_healthy

  skynet-agent-nethermind:
    image: anilchinchawale/xdc-agent:latest
    platform: linux/amd64
    container_name: skynet-agent-nethermind
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - RPC_URL=http://xdc-node-nethermind-apothem:8558
      - SKYNET_NODE_NAME=local-apothem-nethermind
      - SKYNET_API_URL=https://skynet.xdcindia.com/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - XDC_CONTAINER_NAME=xdc-node-nethermind-apothem
    networks:
      - xdc-network
    depends_on:
      xdc-node-nethermind-apothem:
        condition: service_healthy

  # ==================== PEER CONNECTOR ====================
  peer-connector:
    image: alpine/curl:latest
    platform: linux/amd64
    container_name: peer-connector
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache jq > /dev/null 2>&1
        echo "Waiting 30s for nodes to start..."
        sleep 30
        
        # Get enode from geth v2.6.8
        GETH_ENODE=$$(curl -sf -X POST http://xdc-node-apothem:8545 -H 'Content-Type: application/json' \
          -d '{"jsonrpc":"2.0","method":"admin_nodeInfo","params":[],"id":1}' | jq -r '.result.enode')
        echo "Geth enode: $$GETH_ENODE"
        
        # Add geth as peer to GP5
        curl -sf -X POST http://xdc-node-gx-apothem:9545 -H 'Content-Type: application/json' \
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"admin_addPeer\",\"params\":[\"$$GETH_ENODE\"],\"id\":1}" || true
        
        # Add geth as trusted peer to erigon
        curl -sf -X POST http://xdc-node-erigon-apothem:8556 -H 'Content-Type: application/json' \
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"admin_addTrustedPeer\",\"params\":[\"$$GETH_ENODE\"],\"id\":1}" || true
        
        echo "Peers connected!"
        # Keep running and re-add peers every 5 minutes
        while true; do
          sleep 300
          curl -sf -X POST http://xdc-node-gx-apothem:9545 -H 'Content-Type: application/json' \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"admin_addPeer\",\"params\":[\"$$GETH_ENODE\"],\"id\":1}" > /dev/null 2>&1 || true
          curl -sf -X POST http://xdc-node-erigon-apothem:8556 -H 'Content-Type: application/json' \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"admin_addTrustedPeer\",\"params\":[\"$$GETH_ENODE\"],\"id\":1}" > /dev/null 2>&1 || true
        done
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy

volumes:
  xdc-apothem-data:
    driver: local
  xdc-gx-apothem-data:
    driver: local
  xdc-erigon-apothem-data:
    driver: local
  xdc-nethermind-apothem-data:
    driver: local

networks:
  xdc-network:
    driver: bridge
    name: docker_xdc-network
