# ============================================================
# GP5 (go-ethereum XDC / geth-pr5) Client Configuration
# Issue: https://github.com/XDCIndia/xdc-node-setup/issues/83
# ============================================================
# IMPORTANT: Use --http.port (NOT --rpcport — that flag was removed)
# Runs full sync with archive mode for complete state history

# --- Sync & Storage ---
SYNCMODE=full
GCMODE=archive

# --- Network ---
CHAIN_ID=50
NETWORK=xdc-mainnet

# --- RPC flags (correct flag names for geth-pr5) ---
# --http.port        (not --rpcport)
# --http.addr        (not --rpcaddr)
# --http.api         (not --rpcapi)
# --ws.port          (not --wsport)

# --- Default Ports (override via ports.env) ---
HTTP_PORT=8545
WS_PORT=8549
P2P_PORT=30303
AUTHRPC_PORT=8560
METRICS_PORT=6060

# --- Extra flags ---
# --http
# --http.addr 0.0.0.0
# --http.port ${HTTP_PORT}
# --http.corsdomain "*"
# --http.api eth,net,web3,xdpos,miner
# --ws
# --ws.addr 0.0.0.0
# --ws.port ${WS_PORT}
# --ws.origins "*"
# --syncmode ${SYNCMODE}
# --gcmode ${GCMODE}
# --metrics
# --metrics.addr 0.0.0.0
# --metrics.port ${METRICS_PORT}
# --authrpc.addr 0.0.0.0
# --authrpc.port ${AUTHRPC_PORT}

# --- Docker image ---
IMAGE_DEFAULT=anilchinchawale/gx:fix-7ae44d3fd

# --- Data ---
DATA_DIR=/root/.xdc/XDC
