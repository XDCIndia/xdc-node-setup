# ============================================================
# Nethermind XDC Client Configuration
# Issue: https://github.com/XDCIndia/xdc-node-setup/issues/83
# ============================================================
# IMPORTANT:
#   - Use --config xdc-mainnet (not chain name)
#   - Base image must be Ubuntu Noble (24.04) for glibc 2.39+
#   - XdcStateRootCache plugin required for XDPoS v2 state verification

# --- Network ---
CONFIG=xdc-mainnet
NETWORK=mainnet

# --- Ubuntu Noble (glibc requirement) ---
BASE_IMAGE=ubuntu:noble
# Nethermind requires glibc 2.39+ — Noble ships with 2.39
# DO NOT use older Ubuntu (Focal/Jammy) — missing glibc symbols

# --- Plugin ---
# XdcStateRootCache: caches XDPoS v2 state roots to avoid re-computation
PLUGIN_XDCSTATEROOTCACHE=true

# --- Default Ports ---
RPC_PORT=8558
WS_PORT=8559
P2P_PORT=30305
AUTHRPC_PORT=8563
METRICS_PORT=6062

# --- Key flags ---
# --config ${CONFIG}
# --JsonRpc.Enabled true
# --JsonRpc.Host 0.0.0.0
# --JsonRpc.Port ${RPC_PORT}
# --JsonRpc.WebSocketsPort ${WS_PORT}
# --JsonRpc.EngineHost 0.0.0.0
# --JsonRpc.EnginePort ${AUTHRPC_PORT}
# --Metrics.Enabled true
# --Metrics.ExposePort ${METRICS_PORT}
# --Sync.SnapSync true
# --Plugins.PluginFiles /nethermind/plugins/XdcStateRootCache.dll

# --- Docker image ---
IMAGE_DEFAULT=anilchinchawale/nmx:reward-fix-20260331
