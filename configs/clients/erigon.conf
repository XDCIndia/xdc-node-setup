# ============================================================
# Erigon XDC Client Configuration
# Issue: https://github.com/XDCIndia/xdc-node-setup/issues/83
# ============================================================
# IMPORTANT:
#   - Requires network_mode: host (no bridge — sentries need raw p2p)
#   - Run as uid 1000 (non-root, erigon security requirement)
#   - Needs TWO sentry instances for mainnet peer diversity

# --- Network ---
CHAIN=xdc-mainnet
NETWORK=mainnet

# --- User / Security ---
UID=1000
GID=1000

# --- Network Mode ---
NETWORK_MODE=host

# --- Default Ports ---
RPC_PORT=8547
WS_PORT=8546
P2P_PORT=30304
AUTHRPC_PORT=8561
PRIVATE_API_PORT=9091
METRICS_PORT=6061
SENTRY1_PORT=30320
SENTRY2_PORT=30321

# --- Two Sentry Setup ---
# Sentry 1: primary peers
# Sentry 2: secondary / geographic diversity
# Both connect to erigon via --sentries.api.addr

# --- Key flags ---
# --chain ${CHAIN}
# --private.api.addr 127.0.0.1:${PRIVATE_API_PORT}
# --http --http.addr 0.0.0.0 --http.port ${RPC_PORT}
# --ws --http.api eth,erigon,net,web3,debug,xdpos
# --authrpc.addr 0.0.0.0 --authrpc.port ${AUTHRPC_PORT}
# --metrics --metrics.addr 0.0.0.0 --metrics.port ${METRICS_PORT}
# --sentries.api.addr 127.0.0.1:${PRIVATE_API_PORT}

# --- Docker image ---
IMAGE_DEFAULT=xdcindia/erigon-xdc:canary-c9bd43670d
