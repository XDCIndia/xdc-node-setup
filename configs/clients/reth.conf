# ============================================================
# Reth XDC Client Configuration
# Issue: https://github.com/XDCIndia/xdc-node-setup/issues/83
# ============================================================
# IMPORTANT:
#   - Requires FCU (ForkchoiceUpdated) call after every restart
#     to resume block processing (XDPoS v2 consensus handshake)
#   - XDC_BYPASS_STATE_ROOT=1 env var required (XDPoS state root differs)
#   - Use Erigon as a peer for faster initial sync (trusted peer)

# --- Network ---
CHAIN=xdc-mainnet
NETWORK=mainnet

# --- Required Environment ---
XDC_BYPASS_STATE_ROOT=1

# --- FCU After Restart ---
# Reth will stall at head after restart without FCU.
# Run scripts/docker/shared/reth-fcu.sh after container start.
FCU_REQUIRED_ON_RESTART=true

# --- Default Ports ---
RPC_PORT=8548
WS_PORT=8589
P2P_PORT=30306
DISCOVERY_PORT=30307
AUTHRPC_PORT=8562
METRICS_PORT=6063

# --- Erigon as peer (for sync) ---
# Add erigon enr/enode to --trusted-peers
TRUSTED_PEER_CLIENT=erigon

# --- Key flags ---
# --chain ${CHAIN}
# --http --http.addr 0.0.0.0 --http.port ${RPC_PORT} --http.api eth,net,web3,debug
# --ws --ws.addr 0.0.0.0 --ws.port ${WS_PORT}
# --authrpc.addr 0.0.0.0 --authrpc.port ${AUTHRPC_PORT}
# --metrics --metrics.addr 0.0.0.0 --metrics.port ${METRICS_PORT}
# --port ${P2P_PORT}
# --discovery.port ${DISCOVERY_PORT}
# --trusted-peers <erigon-enode>

# --- Docker image ---
IMAGE_DEFAULT=anilchinchawale/rethx:ecies-fix
