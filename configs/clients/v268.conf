# ============================================================
# v2.6.8 (xinfinorg/xdposchain) Client Configuration
# Issue: https://github.com/XDCIndia/xdc-node-setup/issues/83
# ============================================================
# IMPORTANT:
#   - Binary name is "XDC-mainnet" (NOT "XDC" — different entrypoint)
#   - Uses --http-port (NOT --http.port — older geth fork flag style)
#   - This is the legacy reference client — still needed for validator nodes

# --- Network ---
NETWORK=mainnet
CHAIN_ID=50

# --- Binary ---
BINARY=XDC-mainnet
# NOT: XDC, geth, xdc — must be "XDC-mainnet" for mainnet

# --- Flag Style (LEGACY — different from gp5!) ---
# --http-port      (NOT --http.port)
# --http-addr      (NOT --http.addr)
# --http-api       (NOT --http.api)
# --ws-port        (NOT --ws.port)
# Note: uses hyphen (-) not dot (.) separators

# --- Default Ports ---
HTTP_PORT=8550
WS_PORT=8551
P2P_PORT=30310
METRICS_PORT=6064

# --- Key flags ---
# --networkid 50
# --http
# --http-addr 0.0.0.0
# --http-port ${HTTP_PORT}
# --http-corsdomain "*"
# --http-api eth,net,web3,xdpos
# --ws
# --ws-addr 0.0.0.0
# --ws-port ${WS_PORT}
# --port ${P2P_PORT}
# --datadir /root/.xdc/XDC

# --- Docker image ---
IMAGE_DEFAULT=xinfinorg/xdposchain:v2.6.8
