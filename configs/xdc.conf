# XDC Node Configuration File
# Place this file at /opt/xdc-node/configs/xdc.conf or ~/.xdc-node/config
# All settings are optional - defaults shown below

#==============================================================================
# Network Settings
#==============================================================================
NETWORK=mainnet              # mainnet, testnet, or apothem
INSTANCE_NAME=xdc-node       # Name shown in ethstats

#==============================================================================
# Ethstats Configuration
#==============================================================================
STATS_SERVER=stats.xdcindia.com:443   # Ethstats server (WSS via nginx)
STATS_SECRET=xdc_openscan_stats_2026  # Ethstats auth secret

#==============================================================================
# Node Type
#==============================================================================
SYNC_MODE=full               # full or fast
GC_MODE=full                 # full or archive (archive for masternodes)
NODE_TYPE=full               # full, archive, masternode, rpc

#==============================================================================
# P2P Network
#==============================================================================
PORT=30303                   # P2P port (change if running multiple nodes)
NAT=any                      # NAT traversal: any, none, extip:<ip>

#==============================================================================
# RPC Configuration
#==============================================================================
ENABLE_RPC=true
RPC_ADDR=0.0.0.0
RPC_PORT=8545
RPC_API=admin,eth,net,web3,XDPoS
RPC_CORS_DOMAIN=*
RPC_VHOSTS=*

#==============================================================================
# WebSocket Configuration
#==============================================================================
WS_ADDR=0.0.0.0
WS_PORT=8546
WS_API=eth,net,web3,XDPoS
WS_ORIGINS=*

#==============================================================================
# Metrics and Profiling
#==============================================================================
METRICS=true
METRICS_ADDR=0.0.0.0
METRICS_PORT=6060
PPROF=true
PPROF_ADDR=0.0.0.0
PPROF_PORT=6060

#==============================================================================
# Logging
#==============================================================================
LOG_LEVEL=2                  # 0=silent, 1=error, 2=warn, 3=info, 4=debug
MAX_LOG_SIZE=1073741824      # 1GB default

#==============================================================================
# Bootnodes (optional - defaults to XDC network bootnodes)
#==============================================================================
# BOOTNODES=enode://...enode://...

#==============================================================================
# SkyNet Registration (optional)
#==============================================================================
SKYNET_EMAIL=
SKYNET_TELEGRAM=
ENABLE_SKYNET=true

#==============================================================================
# Monitoring Stack (disabled by default)
#==============================================================================
# To enable: docker compose --profile monitoring up -d
ENABLE_PROMETHEUS=false
ENABLE_GRAFANA=false

#==============================================================================
# Data Directory
#==============================================================================
DATA_DIR=/opt/xdc-node/mainnet/xdcchain

#==============================================================================
# Security
#==============================================================================
# Password file location (empty = no password)
PASSWORD_FILE=/opt/xdc-node/mainnet/.pwd
