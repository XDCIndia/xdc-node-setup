#==============================================================================
# Dependency Pinning Configuration
# Pin all external tool versions for reproducible builds
#==============================================================================

#------------------------------------------------------------------------------
# Docker Images
#------------------------------------------------------------------------------
docker_images:
  xdc_node:
    repository: xinfinorg/xdposchain
    tag: v2.6.8
    digest: sha256:...  # Add actual digest after pull
  
  # Monitoring
  prometheus:
    repository: prom/prometheus
    tag: v2.48.0
  grafana:
    repository: grafana/grafana
    tag: 10.2.3
  node_exporter:
    repository: prom/node-exporter
    tag: v1.7.0
  cadvisor:
    repository: gcr.io/cadvisor/cadvisor
    tag: v0.47.2
  alertmanager:
    repository: prom/alertmanager
    tag: v0.26.0
  loki:
    repository: grafana/loki
    tag: 2.9.3
  promtail:
    repository: grafana/promtail
    tag: 2.9.3

  # Infrastructure
  traefik:
    repository: traefik
    tag: v2.10.7
  nginx:
    repository: nginx
    tag: 1.25.3-alpine
  certbot:
    repository: certbot/certbot
    tag: v2.8.0

  # Databases (optional)
  postgres:
    repository: postgres
    tag: 16.1-alpine
  redis:
    repository: redis
    tag: 7.2.3-alpine

#------------------------------------------------------------------------------
# Binary Tools
#------------------------------------------------------------------------------
binary_tools:
  # Required
  docker:
    version: ">=20.10.0"
    recommended: "24.0.7"
  
  docker_compose:
    version: ">=2.0.0"
    recommended: "2.23.3"
  
  jq:
    version: ">=1.6"
    
  curl:
    version: ">=7.68.0"
  
  # Development/Testing
  shellcheck:
    version: ">=0.8.0"
    recommended: "0.9.0"
    
  bats:
    version: ">=1.8.0"
    recommended: "1.10.0"
  
  yamllint:
    version: ">=1.28.0"
    recommended: "1.33.0"
  
  # Infrastructure tools
  terraform:
    version: ">=1.3.0"
    recommended: "1.6.6"
  
  ansible:
    version: ">=2.12.0"
    recommended: "2.16.2"
  
  helm:
    version: ">=3.12.0"
    recommended: "3.13.3"
  
  kubectl:
    version: ">=1.27.0"
    recommended: "1.28.4"
  
  # Security tools
  age:
    version: ">=1.1.0"
    recommended: "1.1.1"
  
  gitleaks:
    version: ">=8.18.0"
    recommended: "8.18.1"

#------------------------------------------------------------------------------
# Python Packages (for Ansible/Molecule)
#------------------------------------------------------------------------------
python_packages:
  ansible:
    version: "8.7.0"
  ansible-core:
    version: "2.16.2"
  molecule:
    version: "6.0.3"
  molecule-docker:
    version: "2.1.0"
  pytest:
    version: "7.4.4"
  pytest-testinfra:
    version: "10.0.0"
  yamllint:
    version: "1.33.0"
  ansible-lint:
    version: "6.22.1"

#------------------------------------------------------------------------------
# Node.js Packages (for Dashboard)
#------------------------------------------------------------------------------
nodejs_packages:
  next:
    version: "14.0.4"
  react:
    version: "18.2.0"
  typescript:
    version: "5.3.3"
  tailwindcss:
    version: "3.4.0"
  eslint:
    version: "8.56.0"
  prettier:
    version: "3.1.1"

#------------------------------------------------------------------------------
# System Packages (Ubuntu/Debian)
#------------------------------------------------------------------------------
system_packages:
  ubuntu_2204:
    required:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - jq
      - bc
      - net-tools
      - htop
      - iotop
      - nethogs
    security:
      - ufw
      - fail2ban
      - auditd
      - aide
      - apparmor
      - apparmor-utils
    monitoring:
      - prometheus-node-exporter
      - ntp
      - chrony
    development:
      - git
      - shellcheck
      - bats

#------------------------------------------------------------------------------
# GitHub Actions (CI/CD)
#------------------------------------------------------------------------------
github_actions:
  actions/checkout:
    version: v4.1.1
  actions/setup-node:
    version: v4.0.1
  actions/setup-python:
    version: v5.0.0
  docker/setup-buildx-action:
    version: v3.0.0
  docker/login-action:
    version: v3.0.0
  docker/build-push-action:
    version: v5.1.0
  hashicorp/setup-terraform:
    version: v3.0.0
  ansible/ansible-lint:
    version: v6.22.1
  golangci/golangci-lint-action:
    version: v3.7.0

#------------------------------------------------------------------------------
# Pre-commit Hooks
#------------------------------------------------------------------------------
pre_commit_hooks:
  pre-commit-hooks:
    rev: v4.5.0
  shellcheck-py:
    rev: v0.9.0.6
  yamllint:
    rev: v1.33.0
  ansible-lint:
    rev: v6.22.1
  pre-commit-terraform:
    rev: v1.86.0
  markdownlint-cli:
    rev: v0.38.0
  codespell:
    rev: v2.2.6
  gitleaks:
    rev: v8.18.1

#------------------------------------------------------------------------------
# Version Check URL Patterns
#------------------------------------------------------------------------------
version_checks:
  docker:
    url: https://download.docker.com/linux/static/stable/x86_64/
    pattern: 'docker-(\d+\.\d+\.\d+)\.tgz'
  
  terraform:
    url: https://api.github.com/repos/hashicorp/terraform/releases/latest
    json_path: .tag_name
  
  ansible:
    url: https://api.github.com/repos/ansible/ansible/releases/latest
    json_path: .tag_name
  
  helm:
    url: https://api.github.com/repos/helm/helm/releases/latest
    json_path: .tag_name
  
  kubectl:
    url: https://storage.googleapis.com/kubernetes-release/release/stable.txt