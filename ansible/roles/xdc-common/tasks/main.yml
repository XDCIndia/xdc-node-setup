---
# XDC Common Role - Base system configuration
# Applied to all XDC nodes

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [packages]

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - git
      - htop
      - iotop
      - net-tools
      - dnsutils
      - jq
      - tree
      - tmux
      - screen
      - rsync
      - unzip
      - zip
      - tar
      - gzip
      - bzip2
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
      - software-properties-common
      - python3
      - python3-pip
      - python3-venv
      - build-essential
      - logrotate
      - cron
    state: present
  tags: [packages]

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone | default('UTC') }}"
  tags: [timezone]

- name: Configure NTP with systemd-timesyncd
  block:
    - name: Ensure systemd-timesyncd is installed
      ansible.builtin.apt:
        name: systemd-timesyncd
        state: present

    - name: Configure timesyncd
      ansible.builtin.copy:
        dest: /etc/systemd/timesyncd.conf
        mode: '0644'
        content: |
          [Time]
          NTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
          FallbackNTP=ntp.ubuntu.com
          RootDistanceMaxSec=5
          PollIntervalMinSec=32
          PollIntervalMaxSec=2048
      notify: Restart timesyncd

    - name: Enable and start systemd-timesyncd
      ansible.builtin.systemd:
        name: systemd-timesyncd
        state: started
        enabled: yes
  tags: [ntp]

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  when: set_hostname | default(true) | bool
  tags: [hostname]

- name: Update /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present
  tags: [hostname]

- name: Configure system limits
  ansible.builtin.copy:
    dest: /etc/security/limits.d/99-xdc-node.conf
    mode: '0644'
    content: |
      # XDC Node system limits
      * soft nofile 65535
      * hard nofile 65535
      * soft nproc 65535
      * hard nproc 65535
      root soft nofile 65535
      root hard nofile 65535
  tags: [limits]

- name: Configure PAM limits
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: 'session required pam_limits.so'
    state: present
  tags: [limits]

- name: Configure sysctl for XDC node
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    # File descriptors
    - { name: 'fs.file-max', value: '2097152' }
    # Network tuning
    - { name: 'net.core.somaxconn', value: '65535' }
    - { name: 'net.core.netdev_max_backlog', value: '65535' }
    - { name: 'net.core.rmem_max', value: '16777216' }
    - { name: 'net.core.wmem_max', value: '16777216' }
    - { name: 'net.ipv4.tcp_rmem', value: '4096 87380 16777216' }
    - { name: 'net.ipv4.tcp_wmem', value: '4096 65536 16777216' }
    - { name: 'net.ipv4.tcp_max_syn_backlog', value: '65535' }
    - { name: 'net.ipv4.tcp_tw_reuse', value: '1' }
    - { name: 'net.ipv4.tcp_fin_timeout', value: '15' }
    - { name: 'net.ipv4.ip_local_port_range', value: '1024 65535' }
    # Memory
    - { name: 'vm.swappiness', value: '10' }
    - { name: 'vm.dirty_ratio', value: '60' }
    - { name: 'vm.dirty_background_ratio', value: '2' }
  tags: [sysctl]

- name: Configure logrotate for XDC logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/xdc-node
    mode: '0644'
    content: |
      {{ xdc_data_dir | default('/root/XDC-Node') }}/logs/*.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0640 root root
          copytruncate
      }
  tags: [logrotate]

- name: Create XDC utility scripts directory
  ansible.builtin.file:
    path: /usr/local/bin/xdc
    state: directory
    mode: '0755'
  tags: [scripts]

- name: Create common utility scripts
  ansible.builtin.copy:
    dest: /usr/local/bin/xdc/check-sync
    mode: '0755'
    content: |
      #!/bin/bash
      # Quick sync status check
      curl -s -X POST -H "Content-Type: application/json" \
        --data '{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}' \
        http://localhost:${1:-8545} | jq .
  tags: [scripts]

- name: Add XDC scripts to PATH
  ansible.builtin.lineinfile:
    path: /etc/profile.d/xdc-path.sh
    line: 'export PATH=$PATH:/usr/local/bin/xdc'
    create: yes
    mode: '0644'
  tags: [scripts]
