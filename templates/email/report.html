<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #12121a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #1F4CED;
        }
        .report-icon {
            width: 60px;
            height: 60px;
            background: rgba(31, 76, 237, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 28px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .content {
            padding: 30px;
        }
        .section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            color: #1F4CED;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .metric-card {
            background: rgba(31, 76, 237, 0.05);
            border: 1px solid rgba(31, 76, 237, 0.1);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }
        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #1F4CED;
            font-family: 'Courier New', monospace;
        }
        .metric-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .status-pass {
            color: #28a745;
        }
        .status-warning {
            color: #ffc107;
        }
        .status-fail {
            color: #dc3545;
        }
        .check-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .check-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .check-item:last-child {
            border-bottom: none;
        }
        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 12px;
        }
        .check-icon.pass {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        .check-icon.warning {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        .check-icon.fail {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        .security-score {
            text-align: center;
            padding: 20px;
            background: rgba(31, 76, 237, 0.05);
            border-radius: 8px;
        }
        .score-value {
            font-size: 48px;
            font-weight: 700;
            color: #1F4CED;
            line-height: 1;
        }
        .score-label {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        .score-rating {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        .rating-excellent {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        .rating-good {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        .rating-fair {
            background: rgba(253, 126, 20, 0.2);
            color: #fd7e14;
        }
        .rating-poor {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        .footer {
            background: #0d0d12;
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-logo {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
        }
        .footer-text {
            color: #666;
            font-size: 12px;
        }
        .footer-brand {
            color: #1F4CED;
            font-weight: 600;
        }
        @media only screen and (max-width: 600px) {
            .container {
                margin: 10px;
                border-radius: 8px;
            }
            .header, .content, .footer {
                padding: 20px;
            }
            .metric-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="report-icon">📊</div>
            <h1>{{TITLE}}</h1>
            <div class="subtitle">{{NODE_HOST}} • {{TIMESTAMP}}</div>
        </div>
        
        <div class="content">
            {{MESSAGE}}
        </div>
        
        <div class="footer">
            <svg class="footer-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#1F4CED" stroke-width="2"/>
                <path d="M30 50 L50 30 L70 50 L50 70 Z" fill="#1F4CED"/>
            </svg>
            <p class="footer-text">
                <span class="footer-brand">XDC Node Monitor</span><br>
                Automated daily health report from your XDC Network node.
            </p>
        </div>
    </div>
</body>
</html>
