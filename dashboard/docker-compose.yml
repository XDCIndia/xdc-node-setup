services:
  xdc-dashboard:
    build: .
    ports:
      - "8888:3000"
    environment:
      - PROMETHEUS_URL=http://127.0.0.1:19090
      - RPC_URL=http://127.0.0.1:38545
      - NEXT_PUBLIC_REFRESH_INTERVAL=30
      - GEO_CACHE_TTL=300000
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
