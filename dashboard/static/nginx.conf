# XDC Node Status Dashboard - Nginx Configuration
# Place this in /etc/nginx/sites-available/xdc-dashboard or include in nginx.conf

server {
    listen 80;
    listen [::]:80;
    
    # Server name - adjust as needed
    server_name localhost;
    
    # Document root - adjust path as needed
    root /var/www/xdc-dashboard;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(html|htm)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.html;
        
        # CORS headers for Prometheus API access (if proxying)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
    }

    # Optional: Proxy Prometheus API to avoid CORS issues
    # Uncomment and adjust if your Prometheus is not CORS-enabled
    #
    # location /prometheus/ {
    #     proxy_pass http://localhost:19090/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     
    #     # CORS headers
    #     add_header Access-Control-Allow-Origin "*" always;
    #     add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    #     
    #     if ($request_method = 'OPTIONS') {
    #         add_header Access-Control-Allow-Origin "*";
    #         add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    #         add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
    #         add_header Access-Control-Max-Age 1728000;
    #         add_header Content-Type 'text/plain; charset=utf-8';
    #         add_header Content-Length 0;
    #         return 204;
    #     }
    # }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/xdc-dashboard-access.log;
    error_log /var/log/nginx/xdc-dashboard-error.log;
}

