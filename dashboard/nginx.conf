server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/health {
        access_log off;
        return 200 '{"status":"ok","service":"xdc-dashboard"}';
        add_header Content-Type application/json;
    }

    location /api/nodes {
        access_log off;
        # Proxy to XDC node RPC
        # This is a simple static response for now
        return 200 '{"nodes":[],"count":0}';
        add_header Content-Type application/json;
    }
}
