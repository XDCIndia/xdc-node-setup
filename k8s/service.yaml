apiVersion: v1
kind: Service
metadata:
  name: xdc-node
  namespace: xdc-network
  labels:
    app: xdc-node
spec:
  selector:
    app: xdc-node
  ports:
  - name: rpc
    port: 8545
    targetPort: 8545
    protocol: TCP
  - name: websocket
    port: 8546
    targetPort: 8546
    protocol: TCP
  - name: p2p-tcp
    port: 30303
    targetPort: 30303
    protocol: TCP
  - name: p2p-udp
    port: 30303
    targetPort: 30303
    protocol: UDP
  - name: metrics
    port: 6060
    targetPort: 6060
    protocol: TCP
  type: LoadBalancer
  # For bare metal, use NodePort instead:
  # type: NodePort
