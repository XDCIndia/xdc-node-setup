apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: xdc-node-policy
  namespace: xdc-network
spec:
  podSelector:
    matchLabels:
      app: xdc-node
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow P2P traffic from anywhere
  - from: []
    ports:
    - protocol: TCP
      port: 30303
    - protocol: UDP
      port: 30303
  
  # Allow RPC from internal networks only
  - from:
    - namespaceSelector: {}
      podSelector: {}
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    - ipBlock:
        cidr: 192.168.0.0/16
    ports:
    - protocol: TCP
      port: 8545
    - protocol: TCP
      port: 8546
  
  # Allow metrics scraping from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 6060
  
  egress:
  # Allow all outbound (P2P discovery)
  - to: []
    ports:
    - protocol: TCP
      port: 30303
    - protocol: UDP
      port: 30303
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
