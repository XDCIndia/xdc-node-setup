apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xdc-data-template
  namespace: xdc-network
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 1000Gi
  # For production, use a storage class with:
  # - Volume expansion support
  # - Snapshot support
  # - SSD backing for performance
