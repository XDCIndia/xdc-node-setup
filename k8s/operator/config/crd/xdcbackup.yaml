apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: xdcbackups.xdc.network
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: xdc.network
  names:
    kind: XDCBackup
    listKind: XDCBackupList
    plural: xdcbackups
    singular: xdcbackup
    shortNames:
      - xdcbk
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeRef
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Last Backup
          type: date
          jsonPath: .status.lastBackupTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: XDCBackup defines a backup policy for XDC node data.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - nodeRef
                - schedule
                - destination
              properties:
                nodeRef:
                  type: string
                  description: Reference to the XDCNode to back up.
                schedule:
                  type: string
                  description: Cron expression for backup schedule.
                retentionDays:
                  type: integer
                  minimum: 1
                  maximum: 365
                  default: 30
                compression:
                  type: boolean
                  default: true
                suspend:
                  type: boolean
                  default: false
                destination:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum: [s3, gcs, pvc]
                    bucket:
                      type: string
                    path:
                      type: string
                    secretRef:
                      type: string
                    pvcName:
                      type: string
            status:
              type: object
              properties:
                lastBackupTime:
                  type: string
                  format: date-time
                lastBackupSize:
                  type: integer
                  format: int64
                backupCount:
                  type: integer
                phase:
                  type: string
                  enum: [Active, Running, Failed, Suspended]
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
