apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: xdc-node
  namespace: xdc-network
  labels:
    app: xdc-node
spec:
  serviceName: xdc-node
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: xdc-node
  template:
    metadata:
      labels:
        app: xdc-node
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6060"
        prometheus.io/path: "/debug/metrics/prometheus"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      # Init container for snapshot download (optional)
      initContainers:
      - name: snapshot-downloader
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          if [ "${DOWNLOAD_SNAPSHOT:-false}" = "true" ] && [ ! -f /data/chaindata/CURRENT ]; then
            echo "Downloading snapshot..."
            # Add snapshot download logic here
            # wget -O - "$SNAPSHOT_URL" | tar xz -C /data
            echo "Snapshot download complete"
          else
            echo "Skipping snapshot download"
          fi
        volumeMounts:
        - name: xdc-data
          mountPath: /data
        env:
        - name: DOWNLOAD_SNAPSHOT
          value: "false"
        - name: SNAPSHOT_URL
          value: ""
      
      containers:
      - name: xdc-node
        image: xinfinorg/xdposchain:v2.6.8
        imagePullPolicy: IfNotPresent
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
        
        ports:
        - containerPort: 8545
          name: rpc
          protocol: TCP
        - containerPort: 8546
          name: websocket
          protocol: TCP
        - containerPort: 30303
          name: p2p-tcp
          protocol: TCP
        - containerPort: 30303
          name: p2p-udp
          protocol: UDP
        - containerPort: 6060
          name: metrics
          protocol: TCP
        
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "32Gi"
            cpu: "8"
        
        env:
        - name: NETWORK
          valueFrom:
            configMapKeyRef:
              name: xdc-node-config
              key: NETWORK
        - name: SYNC_MODE
          valueFrom:
            configMapKeyRef:
              name: xdc-node-config
              key: SYNC_MODE
        
        volumeMounts:
        - name: xdc-data
          mountPath: /work/xdcchain
        
        # Liveness probe - checks if process is running
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              curl -sf http://localhost:8545 \
                -X POST \
                -H "Content-Type: application/json" \
                -d '{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}' | \
                grep -q "result"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # Readiness probe - checks if node is synced
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              SYNCING=$(curl -sf http://localhost:8545 \
                -X POST \
                -H "Content-Type: application/json" \
                -d '{"jsonrpc":"2.0","method":"eth_syncing","params":[],"id":1}' | \
                grep -o '"result":[^,]*' | cut -d: -f2)
              if [ "$SYNCING" = "false" ]; then
                exit 0
              else
                exit 1
              fi
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe - gives node time to start
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              curl -sf http://localhost:8545 \
                -X POST \
                -H "Content-Type: application/json" \
                -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' | \
                grep -q "result"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
  
  volumeClaimTemplates:
  - metadata:
      name: xdc-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd  # Configure this for your cluster
      resources:
        requests:
          storage: 1000Gi
