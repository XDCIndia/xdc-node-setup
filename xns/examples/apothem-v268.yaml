name: apothem-v268
network: apothem
client: xdc268
role: masternode
version: "v2.6.8"
image: xdcfoundation/xdc:v2.6.8
datadir: /var/xdc/apothem-v268
rpc:
  enabled: true
  host: "0.0.0.0"
  port: 8545
  vhosts: "*"
  cors: "*"
  apis: "eth,net,web3,xdag,txpool"
ws:
  enabled: true
  host: "0.0.0.0"
  port: 8549
  apis: "eth,net,web3"
ports:
  rpc: 8545
  ws: 8549
  p2p: 30303
  auth: 8551
peers:
  maxPeers: 100
  bootnodes:
    - "enode://..."
restart: unless-stopped
volumes:
  apothem-v268-data: /data
env:
  NETWORK_ID: "51"
