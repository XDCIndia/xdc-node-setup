# Nginx Reverse Proxy Configuration for XDC RPC Rate Limiting
# Place this in /etc/nginx/conf.d/xdc-rpc-proxy.conf

# Define rate limiting zones
# General RPC requests: 10 requests per second with burst of 20
limit_req_zone $binary_remote_addr zone=rpc_general:10m rate=10r/s;

# Expensive operations (trace, debug): 1 request per second
limit_req_zone $binary_remote_addr zone=rpc_expensive:10m rate=1r/s;

# Authentication endpoints: 5 requests per minute
limit_req_zone $binary_remote_addr zone=rpc_auth:10m rate=5r/m;

# Whitelist for trusted IPs (internal monitoring, etc.)
geo $rpc_whitelist {
    default 0;
    127.0.0.1 1;
    10.0.0.0/8 1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
    # Add additional trusted IPs here
    # 1.2.3.4 1;
}

# Map to determine if rate limiting applies
map $rpc_whitelist $rate_limit_key {
    0 $binary_remote_addr;
    1 "";
}

# Upstream XDC node
upstream xdc_backend {
    server 127.0.0.1:8545;
    keepalive 32;
}

# Main RPC server
server {
    listen 8546 ssl http2;
    server_name _;

    # SSL Configuration (required for production)
    ssl_certificate /etc/xdc/certs/node.crt;
    ssl_certificate_key /etc/xdc/certs/node.key;
    ssl_protocols TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Request size limit
    client_max_body_size 1m;
    
    # Timeout settings
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # JSON-RPC endpoint with rate limiting
    location / {
        # Apply general rate limiting (skip for whitelisted IPs)
        limit_req zone=rpc_general burst=20 nodelay;
        limit_req_status 429;
        
        # Add rate limit headers
        add_header X-RateLimit-Limit 10 always;
        add_header X-RateLimit-Remaining $limit_req_remaining always;
        add_header X-RateLimit-Reset $limit_req_reset always;

        proxy_pass http://xdc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json";
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
        
        # CORS for POST requests
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods 'POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
    }

    # Expensive operations - stricter rate limiting
    location ~ ^/(debug_|trace_) {
        limit_req zone=rpc_expensive burst=5 nodelay;
        limit_req_status 429;
        
        add_header X-RateLimit-Limit 1 always;
        add_header X-RateLimit-Remaining $limit_req_remaining always;

        proxy_pass http://xdc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type "application/json";
    }

    # Health check endpoint - no rate limiting
    location /health {
        proxy_pass http://xdc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Short timeout for health checks
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Metrics endpoint - internal only
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://xdc_backend;
        proxy_http_version 1.1;
    }
}

# WebSocket support for real-time subscriptions
server {
    listen 8547 ssl;
    server_name _;

    ssl_certificate /etc/xdc/certs/node.crt;
    ssl_certificate_key /etc/xdc/certs/node.key;
    ssl_protocols TLSv1.3;

    location / {
        limit_req zone=rpc_general burst=50 nodelay;
        
        proxy_pass http://127.0.0.1:8546;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket specific timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# Error responses in JSON-RPC format
error_page 429 /rpc_error_429.json;
error_page 503 /rpc_error_503.json;

location = /rpc_error_429.json {
    internal;
    add_header Content-Type application/json;
    return 429 '{"jsonrpc":"2.0","error":{"code":-32005,"message":"Rate limit exceeded. Too many requests."},"id":null}';
}

location = /rpc_error_503.json {
    internal;
    add_header Content-Type application/json;
    return 503 '{"jsonrpc":"2.0","error":{"code":-32002,"message":"Service unavailable. Node overloaded."},"id":null}';
}
