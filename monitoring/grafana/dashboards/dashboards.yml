apiVersion: 1

providers:
  - name: 'XDC Node Dashboards'
    orgId: 1
    folder: 'XDC Node'
    folderUid: 'xdc-node-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
